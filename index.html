<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - Seu Amigo Artista</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #2b1b3a 0%, #1a2a3a 100%);
    color: white;
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 850px;
    background: rgba(0, 0, 0, 0.65);
    border-radius: 30px;
    padding: 25px;
    backdrop-filter: blur(8px);
    position: relative;
}

.avatar {
    display: block;
    margin: 0 auto 15px;
    width: 85px;
    height: 85px;
    border-radius: 50%;
    border: 3px solid #f9b713;
    object-fit: cover;
}

h1 {
    text-align: center;
    font-size: 2.2rem;
    background: linear-gradient(135deg, #f9b713, #f28500);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 5px;
}

.sub {
    text-align: center;
    color: #ddd;
    margin-bottom: 20px;
    font-style: italic;
}

#chat {
    height: 450px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}

.msg {
    margin-bottom: 12px;
    padding: 10px 15px;
    border-radius: 20px;
    max-width: 85%;
    word-wrap: break-word;
}

.user-msg {
    background: #1e6f5c;
    margin-left: auto;
    border-bottom-right-radius: 5px;
}

.ai-msg {
    background: #4a2e6b;
    margin-right: auto;
    border-bottom-left-radius: 5px;
}

.input-area {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px 18px;
    border-radius: 40px;
    border: none;
    background: #1f2a3e;
    color: white;
    font-size: 1rem;
    outline: none;
}

button {
    padding: 12px 24px;
    border-radius: 40px;
    background: #e67e22;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

button:disabled {
    background: #7f8c8d;
    cursor: not-allowed;
}

.status {
    font-size: 0.8rem;
    background: #00000055;
    padding: 6px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    text-align: center;
}

#loginBox {
    background: rgba(0, 0, 0, 0.85);
    border-radius: 30px;
    padding: 30px;
    text-align: center;
    max-width: 350px;
    margin: 100px auto;
}

#loginBox input {
    width: 100%;
    margin-bottom: 15px;
}

#loginBox button {
    width: 100%;
}

.logout-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #e94560;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 0.8rem;
    color: white;
    cursor: pointer;
    border: none;
}
</style>
</head>
<body>

<div id="app"></div>

<script type="importmap">
{
    "imports": {
        "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm@0.2.56"
    }
}
</script>

<script type="module">
import { CreateMLCEngine } from "@mlc-ai/web-llm";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCQq1DYHivZBIX2_0_NY7eKIoBWG5sKs48",
    authDomain: "candinho-8bee5.firebaseapp.com",
    projectId: "candinho-8bee5"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let user_id = localStorage.getItem("candinho_user");
const appDiv = document.getElementById("app");

function logout() {
    localStorage.removeItem("candinho_user");
    location.reload();
}

function showLoginScreen() {
    appDiv.innerHTML = `
        <div id="loginBox">
            <img src="https://i.imgur.com/fnMYS0Z.png"
                 style="width:80px; border-radius:50%; margin-bottom:20px;">
            <h2 style="color:#f9b713;">Olá! Qual é o seu nome?</h2>
            <input type="text"
                   id="nomeUsuario"
                   placeholder="Digite seu nome">
            <button id="entrarBtn">Entrar</button>
        </div>
    `;

    document.getElementById("entrarBtn").addEventListener("click", () => {
        const nome = document.getElementById("nomeUsuario").value.trim();
        if (!nome) return;

        localStorage.setItem("candinho_user", nome);
        location.reload();
    });
}

if (!user_id) {
    showLoginScreen();
} else {

    appDiv.innerHTML = `
        <div class="container">

            <button class="logout-btn" id="logoutBtn">
                🚪 Sair
            </button>

            <img src="https://i.imgur.com/fnMYS0Z.png"
                 class="avatar"
                 alt="Candinho">

            <h1>Candinho</h1>
            <div class="sub">Seu amigo artista!</div>

            <div id="status" class="status">
                🔄 Inicializando modo gratuito...
            </div>

            <div id="chat">
                <div class="msg ai-msg">
                    🎨 Oi! Eu sou o Candinho, seu amigo artista!
                    Vamos conversar sobre arte, desenhos e criatividade!
                </div>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="pergunta"
                    placeholder="Pergunte sobre arte..."
                    disabled
                >

                <button id="btnEnviar" disabled>
                    Enviar
                </button>
            </div>
        </div>
    `;

    document.getElementById("logoutBtn").addEventListener("click", logout);

    let engine = null;
    let memoria = [];

    const chatDiv = document.getElementById("chat");
    const inputEl = document.getElementById("pergunta");
    const btn = document.getElementById("btnEnviar");
    const statusDiv = document.getElementById("status");

    // ================= FILTRO =================

    const palavrasProibidas = [
        "merda",
        "caralho",
        "puta",
        "bosta",
        "foda",
        "vadia",
        "vagabunda",
        "sexo",
        "pornô",
        "pornografia",
        "violência",
        "sangue",
        "morte",
        "ódio",
        "racismo",
        "homofobia"
    ];

    function contemImproprio(texto) {
        return palavrasProibidas.some(p =>
            texto.toLowerCase().includes(p)
        );
    }

    function mensagemRepudio() {
        return "😊 Vamos conversar com respeito, combinado? Que tal falarmos sobre arte, desenhos ou criatividade?";
    }

    // ================= PERSONALIDADE =================

    const systemPrompt = `
Você é o Candinho, um amigo artista inspirado em Cândido Portinari.

Você conversa com crianças de forma leve, natural e acolhedora.

Fale de forma curta, clara e divertida.

Use no máximo 3 frases curtas por resposta.

Evite respostas robóticas.

Fale sobre arte, criatividade, escola e aprendizado.

Nunca incentive desrespeito ou assuntos impróprios.
`;

    // ================= FIREBASE =================

    async function carregarMemoria() {
        try {
            const q = query(
                collection(db, "memorias"),
                orderBy("created_at")
            );

            const snap = await getDocs(q);
            memoria = [];

            snap.forEach(doc => {
                const d = doc.data();

                if (d.user_id === user_id) {
                    memoria.push({
                        role: d.role,
                        content: d.content
                    });
                }
            });

        } catch (e) {
            console.warn("Erro ao carregar memória:", e);
        }
    }

    async function salvarMemoria(role, content) {
        try {
            await addDoc(collection(db, "memorias"), {
                user_id,
                role,
                content,
                created_at: Date.now()
            });
        } catch (e) {
            console.warn("Erro ao salvar memória:", e);
        }
    }

    // ================= IA LOCAL =================

    async function initLocal() {
        try {
            statusDiv.innerHTML =
                "🧠 Preparando Candinho (primeira vez pode demorar)...";

            engine = await CreateMLCEngine(
                "TinyLlama-1.1B-Chat-v0.4-q4f16_1-MLC",
                {
                    initProgressCallback: (p) => {
                        statusDiv.innerHTML =
                            `🖌️ ${p.text} (${Math.round(p.progress * 100)}%)`;
                    }
                }
            );

            statusDiv.innerHTML =
                `✅ Candinho disponível (Olá, ${user_id}) | Modo gratuito`;

            inputEl.disabled = false;
            btn.disabled = false;
            inputEl.focus();

        } catch (e) {
            console.error(e);

            statusDiv.innerHTML =
                "❌ Seu navegador não suporta IA local. Use Chrome ou Edge.";
        }
    }

    async function respostaLocal(pergunta) {
        if (!engine) return null;

        try {
            const resp = await engine.chat.completions.create({
                messages: [
                    {
                        role: "system",
                        content: systemPrompt
                    },
                    ...memoria.slice(-8),
                    {
                        role: "user",
                        content: pergunta
                    }
                ],
                max_tokens: 120,
                temperature: 0.8
            });

            return resp.choices[0].message.content;

        } catch (e) {
            console.warn(e);
            return null;
        }
    }

    // ================= INTERFACE =================

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function addMessage(text, isUser = false) {
        const div = document.createElement("div");

        div.className = `msg ${isUser ? "user-msg" : "ai-msg"}`;

        div.innerHTML = `
            <b>${isUser ? user_id : "Candinho"}</b><br>
            ${escapeHtml(text)}
        `;

        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function enviarMensagem() {
        const texto = inputEl.value.trim();

        if (!texto) return;

        // filtro antes da IA
        if (contemImproprio(texto)) {
            addMessage(texto, true);
            addMessage(mensagemRepudio(), false);

            inputEl.value = "";
            return;
        }

        addMessage(texto, true);

        inputEl.value = "";
        inputEl.disabled = true;
        btn.disabled = true;

        await salvarMemoria("user", texto);

        memoria.push({
            role: "user",
            content: texto
        });

        const resposta =
            await respostaLocal(texto) ||
            "😅 Não consegui entender. Pode repetir de outra forma?";

        addMessage(resposta, false);

        await salvarMemoria("assistant", resposta);

        memoria.push({
            role: "assistant",
            content: resposta
        });

        inputEl.disabled = false;
        btn.disabled = false;
        inputEl.focus();
    }

    // ================= EVENTOS =================

    btn.addEventListener("click", enviarMensagem);

    inputEl.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !inputEl.disabled) {
            enviarMensagem();
        }
    });

    // ================= START =================

    async function init() {
        await carregarMemoria();
        await initLocal();
    }

    init();
}
</script>

</body>
</html>
