<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Candinho</title>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #ffeaa7, #81ecec);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 800px;
        width: 100%;
        background: white;
        border-radius: 35px;
        box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    .header {
        background: #6c5ce7;
        color: white;
        padding: 20px;
        text-align: center;
    }
    .avatar {
        width: 80px;
        border-radius: 50%;
        border: 3px solid #f9b713;
        margin-bottom: 10px;
    }
    .header h2 {
        margin: 0;
        font-size: 1.6rem;
    }
    #status {
        font-size: 0.8rem;
        margin-top: 5px;
        opacity: 0.9;
    }
    #chat {
        height: 400px;
        overflow-y: auto;
        background: #f8f9fa;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .msg {
        max-width: 80%;
        padding: 10px 15px;
        border-radius: 20px;
        line-height: 1.4;
        word-wrap: break-word;
        animation: fadeIn 0.2s ease;
    }
    .user {
        background: #74b9ff;
        align-self: flex-end;
        color: #000;
        border-bottom-right-radius: 5px;
    }
    .bot {
        background: #55efc4;
        align-self: flex-start;
        border-bottom-left-radius: 5px;
    }
    .error {
        background: #ffcccc;
        align-self: flex-start;
        border-left: 4px solid #ff0000;
    }
    .loading {
        background: #dfe6e9;
        font-style: italic;
        animation: pulse 1s infinite;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
    .input-area {
        display: flex;
        padding: 15px;
        background: white;
        border-top: 1px solid #ddd;
        gap: 10px;
    }
    input {
        flex: 1;
        padding: 12px 18px;
        border: 2px solid #6c5ce7;
        border-radius: 50px;
        font-size: 1rem;
        outline: none;
    }
    button {
        background: #fd79a8;
        border: none;
        padding: 0 20px;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
   
   
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://i.imgur.com/fnMYS0Z.png" alt="Candinho" class="avatar">
        <h2>Candinho 🎨</h2>
        <div id="status">🔄 Carregando conhecimentos...</div>
    </div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="pergunta" placeholder="Pergunte sobre arte, dança, história ou peça uma piada..." autocomplete="off">
        <button id="sendBtn">Enviar</button>
    </div>
</div>

    <script type="module">
    // ======================= CONFIGURAÇÕES =======================

    // Base dos JSONs no GitHub 
const GITHUB_BASE = "https://raw.githubusercontent.com/lenilsonxavier-dev/Candinho2.0/main/data/";
    
    const jsonFiles = {
        dancas: "dancas.json",
        artes: "artes_visuais.json",
        artistas: "artistas.json",
        historia: "historia_arte.json",
        teatro: "teatro.json",
        musica: "musica.json",
        folclore: "folclore.json",
        ritmos: "ritmos_musicais.json",
        festas: "festas_brasileiras.json",
        lugares: "lugares_arte.json",
        curiosidades: "curiosidades.json",
        indigena: "cultura_indigena.json",
        afro: "cultura_afro_brasileira.json",
        atividades: "atividades_artisticas.json",
        emocional: "apoio_emocional.json",
        piadas: "piadas.json"
    };
    
    let dataStore = {};
    let historicoMensagens = [];
    let conversaId = localStorage.getItem("candinho_conversaId");
    if (!conversaId) {
        conversaId = `sessao_${Date.now()}`;
        localStorage.setItem("candinho_conversaId", conversaId);
    }
   let memoria = {
    nome: localStorage.getItem("candinho_nome") || "",
    idade: localStorage.getItem("candinho_idade") || "",
    interesses: JSON.parse(localStorage.getItem("candinho_interesses") || "[]"),
    nivel: localStorage.getItem("candinho_nivel") || "iniciante",
    historicoCurto: []
};
    
    const chatDiv = document.getElementById("chat");
    const inputField = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    const statusDiv = document.getElementById("status");
    
    // ======================= FUNÇÕES AUXILIARES =======================
    function addMessageToUI(text, isUser, isError = false) {
        const div = document.createElement("div");
        div.className = `msg ${isUser ? "user" : "bot"} ${isError ? "error" : ""}`;
        div.innerText = text;
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        return div;
    }
    function extrairMemoria(pergunta) {
    const texto = pergunta.toLowerCase();

    // Nome
    const nomeMatch = pergunta.match(/(?:meu nome é|sou|chamo|chamo-me) (\w+)/i);
    if (nomeMatch) {
        memoria.nome = nomeMatch[1];
        localStorage.setItem("candinho_nome", memoria.nome);
        return `Prazer, ${memoria.nome}! Vou lembrar de você 😊`;
    }

    // Idade
    const idadeMatch = pergunta.match(/(\d{1,2}) anos/);
    if (idadeMatch) {
        memoria.idade = idadeMatch[1];
        localStorage.setItem("candinho_idade", memoria.idade);
        return `Legal! Você tem ${memoria.idade} anos 🎈`;
    }

    // Interesses
    const interesses = ["desenhar", "pintar", "dançar", "música", "teatro"];
    for (let interesse of interesses) {
        if (texto.includes(interesse)) {
            if (!memoria.interesses.includes(interesse)) {
                memoria.interesses.push(interesse);
                localStorage.setItem("candinho_interesses", JSON.stringify(memoria.interesses));
                return `Que legal que você gosta de ${interesse}! 🎨`;
            }
        }
    }

    return null;
}
    function addLoading() {
        const div = document.createElement("div");
        div.className = "msg bot loading";
        div.id = "loadingMsg";
        div.innerText = "Candinho está pensando... 🖌️";
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    function removeLoading() {
        const el = document.getElementById("loadingMsg");
        if (el) el.remove();
    }
    
    async function salvarMensagemFirebase(role, content) {
        try {
            await addDoc(collection(db, CONVERSA_COLLECTION), {
                conversaId: conversaId,
                role: role,
                content: content,
                timestamp: new Date()
            });
        } catch (e) {
            console.warn("Erro Firebase:", e);
        }
    }
    
    async function carregarHistoricoFirebase() {
        try {
            const q = query(
                collection(db, CONVERSA_COLLECTION),
                where("conversaId", "==", conversaId),
                orderBy("timestamp", "desc"),
                limit(12)
            );
            const snap = await getDocs(q);
            const msgs = [];
            snap.forEach(doc => msgs.push(doc.data()));
            msgs.reverse();
            historicoMensagens = msgs.map(m => ({ role: m.role, content: m.content }));
            for (let msg of historicoMensagens) {
                addMessageToUI(msg.content, msg.role === "user");
            }
            statusDiv.innerText = "✅ Candinho pronto (memória ativa)";
        } catch (e) {
            console.warn("Erro ao carregar histórico:", e);
            historicoMensagens = [];
            statusDiv.innerText = "⚠️ Memória local apenas (Firebase indisponível)";
        }
    }

    // ======================= CONFIGURAÇÕES =======================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where } 
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQq1DYHivZBIX2_0_NY7eKIoBWG5sKs48",
      authDomain: "candinho-8bee5.firebaseapp.com",
      projectId: "candinho-8bee5",
      storageBucket: "candinho-8bee5.firebasestorage.app",
      messagingSenderId: "342319000222",
      appId: "1:342319000222:web:ab04b940b0175b8722a98f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const CONVERSA_COLLECTION = "conversas_candinho";

    
    // ======================= RESPOSTAS INSTANTÂNEAS (JSONs do GitHub) =======================
    function pegarAleatorio(obj) {
        if (!obj || typeof obj !== "object") return null;
        let valores = Array.isArray(obj) ? obj : Object.values(obj);
        if (valores.length === 0) return null;
        const item = valores[Math.floor(Math.random() * valores.length)];
        if (typeof item === "object" && item !== null) {
            if (item.explicacao_infantil) return item.explicacao_infantil;
            return JSON.stringify(item);
        }
        return String(item);
    }

      function buscarPorNome(obj, texto) {
    for (const chave in obj) {
        const nomeFormatado = chave
            .replaceAll("_", " ")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");

        if (texto.includes(nomeFormatado)) {
            return obj[chave].explicacao_infantil || JSON.stringify(obj[chave]);
        }
    }
    return null;
}
       
    function respostaInstantanea(pergunta) {
       const texto = pergunta.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

const palavras = {
    piada: ["piada", "piadas", "engraçado"],
    curiosidade: ["curiosidade", "curiosidades", "fato interessante"],

    artista: ["artista", "artistas", "pintor", "pintores", "quem foi"],
    atividade: ["atividade", "brincadeira", "desenhar", "pintar", "criar"],
    danca: ["danca", "dança", "dançar", "coreografia", "balé", "samba"],
    historia: ["historia", "história", "passado", "antigamente"],
    musica: ["musica", "música", "som"],
    teatro: ["teatro", "peça", "encenação"],
    folclore: ["folclore", "lenda"],
    ritmo: ["ritmo", "ritmos"],
    festa: ["festa", "festas"],
    lugar: ["lugar", "museu"],
    indigena: ["indigena", "indígena"],
    afro: ["afro", "afro-brasileira"],
    arte: ["arte", "artes"],
    emocional: ["triste", "feliz", "raiva", "medo"]
};

const contem = (lista) => lista?.some(p => texto.includes(p));

try {
    // 😂 PIADAS (aleatório)
    if (contem(palavras.piada) && dataStore.piadas)
        return pegarAleatorio(dataStore.piadas);

    // 🤔 CURIOSIDADES (aleatório)
    if (contem(palavras.curiosidade) && dataStore.curiosidades)
        return pegarAleatorio(dataStore.curiosidades);

    // 🔍 MAPEAMENTO
    const mapa = {
        artista: "artistas",
        atividade: "atividades",
        danca: "dancas",
        historia: "historia",
        musica: "musica",
        teatro: "teatro",
        folclore: "folclore",
        ritmo: "ritmos",
        festa: "festas",
        lugar: "lugares",
        indigena: "indigena",
        afro: "afro",
        arte: "artes",
        emocional: "emocional"
    };

    // 🔍 BUSCA INTELIGENTE
    for (const tipo in mapa) {
        if (contem(palavras[tipo])) {
            const base = dataStore[mapa[tipo]];

            if (base) {
                const resposta = buscarPorNome(base, texto);
                return resposta || pegarAleatorio(base);
            }
        }
    }

} catch (err) {
    console.error("Erro em respostaInstantanea:", err);
}

return null;
    
    // ======================= FUNÇÃO PRINCIPAL =======================
    let isProcessing = false;
    
    // Detecta se o usuário está se apresentando (ex: "Meu nome é...")
    function extrairNome(pergunta) {
        const match = pergunta.match(/(?:meu nome é|sou|chamo-me|chamo) (\w+)/i);
        if (match && match[1]) {
            const nome = match[1];
            localStorage.setItem("candinho_nome", nome);
            nomeUsuario = nome;
            return nome;
        }
        return null;
    }
    
   async function responder(pergunta) {
    // 🧠 0. Detectar memória (nome)
    const memoriaDetectada = extrairMemoria(pergunta);
    if (memoriaDetectada) {
        historicoMensagens.push({ role: "user", content: pergunta });
        historicoMensagens.push({ role: "assistant", content: memoriaDetectada });

        await salvarMensagemFirebase("user", pergunta);
        await salvarMensagemFirebase("assistant", memoriaDetectada);

        return memoriaDetectada;
    }
        // 🧠 perguntas sobre o aluno
if (pergunta.toLowerCase().includes("meu nome")) {
    return memoria.nome 
        ? `Seu nome é ${memoria.nome}! 😊` 
        : "Você ainda não me contou seu nome!";
}

if (pergunta.toLowerCase().includes("quantos anos eu tenho")) {
    return memoria.idade 
        ? `Você tem ${memoria.idade} anos! 🎈` 
        : "Você ainda não me contou sua idade!";
}
        // 1. Resposta instantânea (JSONs)
        const instant = respostaInstantanea(pergunta);
        if (instant) {
            historicoMensagens.push({ role: "user", content: pergunta });
            historicoMensagens.push({ role: "assistant", content: instant });
            await salvarMensagemFirebase("user", pergunta);
            await salvarMensagemFirebase("assistant", instant);
            return instant;
        }
        
       // 🧠 salvar pergunta no contexto da conversa
memoria.historicoCurto.push({ role: "user", content: pergunta });

if (memoria.historicoCurto.length > 6) {
    memoria.historicoCurto.shift();
}

// 2. Chamar o proxy (IA)
try {
    const response = await fetch('/api/groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem: pergunta, memoria: memoria })
    });

    const textResponse = await response.text();
    let data;
    try {
        data = JSON.parse(textResponse);
    } catch (jsonError) {
        console.error("Proxy retornou texto não-JSON:", textResponse.slice(0, 200));
        throw new Error("Resposta inválida do servidor (não é JSON)");
    }

    if (!response.ok) {
        throw new Error(data.error || `Erro HTTP ${response.status}`);
    }

    const respostaIA = data.reply || "Não consegui responder. Tente de novo!";

    // 🧠 salvar resposta no contexto
    memoria.historicoCurto.push({ role: "assistant", content: respostaIA });

    historicoMensagens.push({ role: "user", content: pergunta });
    historicoMensagens.push({ role: "assistant", content: respostaIA });

    await salvarMensagemFirebase("user", pergunta);
    await salvarMensagemFirebase("assistant", respostaIA);

    return respostaIA;

} catch (erro) {
    console.error("Erro no proxy:", erro);
    return "Desculpe, não consegui me conectar à minha central de conhecimentos agora. Tente novamente mais tarde. 🎨";
}
      }
    // ======================= CARREGAR JSONs DO GITHUB =======================
    async function carregarTodosJSONs() {
        statusDiv.innerText = "📥 Baixando respostas instantâneas do GitHub...";
        const promises = [];
        for (const [key, filename] of Object.entries(jsonFiles)) {
            const url = GITHUB_BASE + filename;
            promises.push(
                fetch(url)
                    .then(res => res.ok ? res.json() : (console.warn(`Arquivo ${filename} não encontrado`), {}))
                    .catch(err => { console.warn(`Erro ${filename}:`, err); return {}; })
            );
        }
        const resultados = await Promise.all(promises);
        let idx = 0;
        for (const key of Object.keys(jsonFiles)) {
            dataStore[key] = resultados[idx++];
        }
        const carregados = Object.keys(dataStore).filter(k => Object.keys(dataStore[k]).length > 0);
        console.log("JSONs carregados:", carregados);
        if (carregados.length === 0) {
            statusDiv.innerText = "⚠️ Respostas instantâneas não disponíveis (verifique GitHub)";
        } else {
            statusDiv.innerText = "🎨 Candinho pronto!";
        }
    }
    
    // ======================= INTERFACE ENVIAR =======================
    async function enviar() {
        if (isProcessing) return;
        const texto = inputField.value.trim();
        if (!texto) return;
        
        isProcessing = true;
        sendBtn.disabled = true;
        inputField.disabled = true;
        
        addMessageToUI(texto, true);
        inputField.value = "";
        addLoading();
        
        try {
            const resposta = await responder(texto);
            removeLoading();
            addMessageToUI(resposta, false);
        } catch (err) {
            removeLoading();
            addMessageToUI("Ops! Ocorreu um erro inesperado. Recarregue a página e tente novamente.", false, true);
            console.error(err);
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            inputField.disabled = false;
            inputField.focus();
        }
    }
    
    sendBtn.addEventListener("click", enviar);
    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter" && !isProcessing) enviar(); });
    
    async function init() {
        await carregarTodosJSONs();
        await carregarHistoricoFirebase();
        if (historicoMensagens.length === 0) {
            let boasVindas = "Olá! Sou o Candinho, seu amigo artista. Pergunte sobre artistas, dança, história, ou peça uma piada! 🖌️";
            if (nomeUsuario) boasVindas = `Olá, ${nomeUsuario}! Sou o Candinho, seu amigo artista. Vamos criar? 🎨`;
            addMessageToUI(boasVindas, false);
            historicoMensagens.push({ role: "assistant", content: boasVindas });
            await salvarMensagemFirebase("assistant", boasVindas);
        }
    }
    
    init().catch(err => {
        console.error("Erro na inicialização:", err);
        statusDiv.innerText = "Erro crítico ao iniciar. Verifique o console.";
        addMessageToUI("Não foi possível carregar os conhecimentos do Candinho. Verifique a conexão com a internet e recarregue a página.", false, true);
    });
    
    window.enviar = enviar;
</script>
</body>
</html>
