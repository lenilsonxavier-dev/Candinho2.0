<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - Seu Amigo Artista</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #ffeaa7, #81ecec);
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    max-width: 800px;
    width: 100%;
    background: white;
    padding: 20px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.avatar {
    width: 100px;
    border-radius: 50%;
    border: 3px solid #f9b713;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    margin-bottom: 10px;
}

h2 {
    color: #6c5ce7;
}

#status {
    font-size: 14px;
    margin-bottom: 10px;
    color: #555;
}

#chat {
    height: 400px;
    overflow-y: auto;
    background: #f1f2f6;
    padding: 10px;
    border-radius: 15px;
    margin-bottom: 10px;
}

.msg {
    margin: 10px;
    padding: 10px;
    border-radius: 15px;
    max-width: 80%;
}

.user {
    background: #74b9ff;
    margin-left: auto;
    text-align: right;
}

.bot {
    background: #55efc4;
    text-align: left;
}

input {
    width: 70%;
    padding: 10px;
    border-radius: 20px;
    border: 2px solid #6c5ce7;
}

button {
    padding: 10px;
    border-radius: 20px;
    background: #fd79a8;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="container">
    <img src="./imag/candinho.png" class="avatar">
    <h2>Candinho 🎨</h2>

    <!-- 🟢 STATUS -->
    <div id="status">Carregando Candinho... 🧠</div>

    <div id="chat"></div>

    <input id="pergunta" placeholder="Pergunte algo...">
    <button onclick="enviar()">Enviar</button>
</div>

<script type="importmap">
{
 "imports": {
  "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm@0.2.56"
 }
}
</script>

<script type="module">

import { CreateMLCEngine } from "@mlc-ai/web-llm";

// JSON loader
async function carregarJSON(caminho) {
    const res = await fetch(caminho);
    return await res.json();
}

let dancas, artes, artistas, historia, teatro, musica,
    folclore, ritmos, festas, lugares, curiosidades,
    indigena, afro, atividades, emocional, piadas;

// BUSCADOR
function buscarContexto(pergunta) {
    const texto = pergunta.toLowerCase();

    const bases = [
        dancas, artes, artistas, historia,
        teatro, musica, folclore, ritmos,
        festas, lugares, indigena, afro,
        atividades, emocional
    ];

    for (const base of bases) {
        for (const chave in base) {
            const chaveFormatada = chave.replace(/_/g, " ");
            if (texto.includes(chaveFormatada)) {
                return base[chave].explicacao_infantil;
            }
        }
    }

    return "";
}

// UTIL
function pegarAleatorio(obj) {
    const valores = Object.values(obj);
    return valores[Math.floor(Math.random() * valores.length)];
}

// PERSONALIDADE
const systemPrompt = `Você é Candinho...`;

// IA
let engine;

// 🟢 INIT COM STATUS
async function init() {

    const status = document.getElementById("status");

    try {
        status.innerText = "Carregando as tintas do Candinho... 🧠";

        engine = await CreateMLCEngine("gemma-2-2b-it-q4f16_1-MLC");

        status.innerText = "Candinho pronto! 🎨";

        dancas = await carregarJSON("./data/dancas.json");
        artes = await carregarJSON("./data/artes_visuais.json");
        artistas = await carregarJSON("./data/artistas.json");
        historia = await carregarJSON("./data/historia_arte.json");
        teatro = await carregarJSON("./data/teatro.json");
        musica = await carregarJSON("./data/musica.json");
        folclore = await carregarJSON("./data/folclore.json");
        ritmos = await carregarJSON("./data/ritmos_musicais.json");
        festas = await carregarJSON("./data/festas_brasileiras.json");
        lugares = await carregarJSON("./data/lugares_arte.json");
        curiosidades = await carregarJSON("./data/curiosidades.json");
        indigena = await carregarJSON("./data/cultura_indigena.json");
        afro = await carregarJSON("./data/cultura_afro_brasileira.json");
        atividades = await carregarJSON("./data/atividades_artisticas.json");
        emocional = await carregarJSON("./data/apoio_emocional.json");
        piadas = await carregarJSON("./data/piadas.json");

    } catch (e) {
        status.innerText = "Erro ao carregar Candinho 😢";
        console.error(e);
    }
}

// 🟢 PROTEÇÃO
async function responder(pergunta) {

    if (!engine) {
        return "Estou arrumando o ateliê ainda... espere um pouquinho 🧠🎨";
    }

    const texto = pergunta.toLowerCase();

    if (texto.includes("curiosidade")) return pegarAleatorio(curiosidades);
    if (texto.includes("piada")) return pegarAleatorio(piadas);
    if (texto.includes("atividade")) return pegarAleatorio(atividades);

    const contexto = buscarContexto(pergunta);

    const prompt = `
${systemPrompt}

Use isso:
${contexto || "Explique de forma simples para uma criança."}

Pergunta:
${pergunta}
`;

    const resp = await engine.chat.completions.create({
        messages: [{ role: "system", content: prompt }],
        max_tokens: 120
    });

    return resp.choices[0].message.content;
}

// CHAT
const chat = document.getElementById("chat");

function addMsg(text, user=false) {
    const div = document.createElement("div");
    div.className = "msg " + (user ? "user" : "bot");
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
    const input = document.getElementById("pergunta");
    const texto = input.value;

    if (!texto) return;

    addMsg(texto, true);
    input.value = "";

    const resposta = await responder(texto);
    addMsg(resposta);
}

window.enviar = enviar;

init();

</script>

</body>
</html>
