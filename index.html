<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho Desenhista</title>
<link rel="icon" href="https://i.imgur.com/fnMYS0Z.png">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 1000px;
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px;
    padding: 25px;
    backdrop-filter: blur(5px);
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #ffd700;
    background: #533483;
    margin-bottom: 15px;
}

h1 {
    font-size: 2em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
}

.subtitle {
    color: #ddd;
    margin-bottom: 30px;
    font-style: italic;
}

/* seção gerador */
.input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: #0f3460;
    color: white;
    outline: none;
    font-size: 1em;
}

button {
    padding: 14px 25px;
    border-radius: 30px;
    background: #e94560;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
}

button:hover:not(:disabled) {
    transform: scale(1.05);
    background: #ff6b8a;
}

button:disabled {
    background: #666;
    cursor: not-allowed;
}

#imagemGerada {
    max-width: 100%;
    max-height: 400px;
    border-radius: 15px;
    display: none;
    margin: 20px auto;
    background: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.loading {
    display: none;
    margin: 20px auto;
    color: #ffd700;
    font-size: 1.2em;
}

/* seção catálogo */
.secao {
    margin-top: 40px;
    border-top: 2px solid #ffd700;
    padding-top: 25px;
}

.secao h2 {
    font-size: 1.6em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #0f3460;
    border-radius: 15px;
    overflow: hidden;
    transition: transform 0.2s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: white;
}

.card p {
    padding: 10px;
    font-size: 0.9em;
    text-align: center;
}

.download-btn {
    display: inline-block;
    background: #e94560;
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    margin: 8px;
    border-radius: 20px;
    font-size: 0.8em;
    text-align: center;
}

.download-btn:hover {
    background: #ff6b8a;
}
</style>
</head>
<body>
<div class="container">

    <div style="text-align: center;">
        <img src="https://i.imgur.com/fnMYS0Z.png" class="avatar" alt="Candinho">
        <h1>Candinho Desenhista 🖍️</h1>
        <div class="subtitle">🎨 Sou seu guia no desenho!</div>
    </div>

    <!-- GERADOR SOB DEMANDA -->
    <div class="input-area">
        <input type="text" id="descricao" placeholder="Ex: mapa do Brasil, dinossauro fofo, unicórnio...">
        <button id="gerarBtn">🎨 Gerar desenho</button>
    </div>
    <div class="loading" id="loading">✏️ Criando desenho...</div>
    <img id="imagemGerada" alt="Desenho gerado">

    <!-- CATÁLOGO PRÉ-GERADO -->
    <div class="secao">
        <h2>📚 Catálogo de desenhos para colorir</h2>
        <div id="galeria" class="galeria">
            <div style="grid-column:1/-1; text-align:center;">Carregando catálogo...</div>
        </div>
        <p style="margin-top: 15px; font-size:0.8em; opacity:0.7;">⭐ Clique na imagem para ver em tamanho grande. Clique em "Baixar" para salvar.</p>
    </div>

</div>

<script>
// ==================== GERADOR SOB DEMANDA ====================
const gerarBtn = document.getElementById("gerarBtn");
const descricaoInput = document.getElementById("descricao");
const loadingDiv = document.getElementById("loading");
const imagemGerada = document.getElementById("imagemGerada");

gerarBtn.addEventListener("click", gerarDesenho);
descricaoInput.addEventListener("keypress", (e) => { if (e.key === "Enter") gerarDesenho(); });

async function gerarDesenho() {
    const descricao = descricaoInput.value.trim();
    if (!descricao) return;

    // Filtro básico de segurança
    const palavrasProibidas = ["arma", "sangue", "violencia", "terror", "morte"];
    if (palavrasProibidas.some(p => descricao.toLowerCase().includes(p))) {
        alert("Vamos desenhar coisas seguras e divertidas! 😄");
        return;
    }

    gerarBtn.disabled = true;
    loadingDiv.style.display = "block";
    imagemGerada.style.display = "none";
    imagemGerada.src = "";

    try {
        const promptFinal = `${descricao}, kids coloring book, black and white line art, thick outline, clean lines, no shading, white background`;
        const response = await fetch("/api/imagem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: promptFinal })
        });

        const data = await response.json();
        if (data.imagem) {
            imagemGerada.src = data.imagem;
            imagemGerada.style.display = "block";
        } else {
            alert("Não foi possível gerar o desenho. Tente outra descrição.");
        }
    } catch (err) {
        console.error(err);
        alert("Erro ao gerar imagem. Tente novamente.");
    } finally {
        gerarBtn.disabled = false;
        loadingDiv.style.display = "none";
    }
}

// ==================== CATÁLOGO PRÉ-GERADO ====================
async function carregarCatalogo() {
    const galeriaDiv = document.getElementById("galeria");
    try {
        const response = await fetch("/catalogo.json");
        if (!response.ok) throw new Error("Catálogo não encontrado");
        const catalogo = await response.json();

        if (!catalogo.length) {
            galeriaDiv.innerHTML = '<div style="grid-column:1/-1;">Nenhum desenho no catálogo ainda.</div>';
            return;
        }

        galeriaDiv.innerHTML = "";
        catalogo.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${item.imagemUrl}" alt="${item.titulo}" loading="lazy">
                <p>${item.titulo}</p>
                <a href="${item.imagemUrl}" download class="download-btn">📥 Baixar</a>
            `;
            // Ao clicar na imagem (não no botão), abre em nova aba em tamanho real
            const img = card.querySelector("img");
            img.addEventListener("click", (e) => {
                e.stopPropagation();
                window.open(item.imagemUrl, "_blank");
            });
            galeriaDiv.appendChild(card);
        });
    } catch (error) {
        console.error("Erro ao carregar catálogo:", error);
        galeriaDiv.innerHTML = '<div style="grid-column:1/-1;">⚠️ Catálogo indisponível no momento.</div>';
    }
}

carregarCatalogo();
</script>
</body>
</html>
