<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - IA de Arte</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white; 
    padding: 20px; 
    display: flex; 
    justify-content: center;
    min-height: 100vh;
}

.container { 
    width: 100%; 
    max-width: 800px; 
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px; 
    padding: 25px; 
}

.header { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 20px; 
}

.avatar { 
    width: 70px; 
    height: 70px; 
    border-radius: 50%; 
    object-fit: cover; 
    border: 3px solid #ffd700;
    background: #533483;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
}

.title h1 { font-size: 1.8em; }

#chat { 
    height: 400px; 
    overflow-y: auto; 
    background: rgba(15, 52, 96, 0.6);
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 15px; 
}

.input-area { display: flex; gap: 10px; }

input { 
    flex: 1; 
    padding: 14px; 
    border-radius: 30px; 
    border: none; 
    background: #0f3460;
    color: white;
}

input::placeholder {
    color: #88aacc;
}

button { 
    padding: 14px 25px; 
    border-radius: 30px; 
    background: #e94560; 
    color: white; 
    border: none; 
    cursor: pointer; 
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.02);
}

button:disabled {
    background: #666;
    cursor: not-allowed;
    transform: none;
}

.msg { 
    margin-bottom: 15px; 
    padding: 12px; 
    border-radius: 15px; 
    word-wrap: break-word;
}

.user-msg { 
    background: #1b6ca8; 
    margin-left: 40px;
}

.ai-msg { 
    background: #533483; 
}

#areaImagem {
    margin-top: 10px;
    text-align: center;
}

#imagemGerada {
    max-width: 100%;
    max-height: 300px;
    border-radius: 10px;
    display: none;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.status {
    background: #0f3460;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-align: center;
    font-size: 0.9em;
    transition: all 0.3s;
}

.typing {
    display: inline-block;
    width: 20px;
    text-align: left;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.typing span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="avatar">🎨</div>
    <div class="title">
        <h1>Candinho 🎨</h1>
        <small>Seu amigo artista - IA no seu navegador</small>
    </div>
</div>

<div id="status" class="status">🔧 Carregando o Candinho...</div>

<div id="chat">
    <div class="msg ai-msg">
        <div>
        <b>Candinho</b><br>
        Olá! Que bom te ver por aqui. O que vamos aprender sobre Arte hoje? 😊
        </div>
    </div>
</div>

<div id="areaImagem">
    <img id="imagemGerada" alt="Desenho gerado">
</div>

<div class="input-area">
    <input id="pergunta" placeholder="Ex: Quem foi Van Gogh? ou Me desenhe um dinossauro..." disabled>
    <button onclick="enviarMensagem()" id="sendBtn" disabled>Enviar</button>
</div>

</div>

<script type="importmap">
  {
    "imports": {
      "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm@0.2.56"
    }
  }
</script>

<script type="module">
import * as webllm from "@mlc-ai/web-llm";

let engine = null;
let isReady = false;

// ===== FILTRO DE CONTEÚDO =====
function validarPromptArte(input) {
    const proibidos = ["violência","arma","sexo","nudez","droga","morte","sangue"];
    const t = input.toLowerCase();
    
    if (proibidos.some(p => t.includes(p))) {
        return { ok: false, msg: "🚫 Esse tema não é apropriado, meu jovem. Vamos falar de arte bonita e educativa!" };
    }
    
    return { ok: true };
}

function ehPedidoDeImagem(texto) {
    const palavras = ["desenho", "colorir", "imagem", "ilustração", "desenha", "pintar", "faça um", "crie um"];
    return palavras.some(p => texto.toLowerCase().includes(p));
}

// ===== GERAR IMAGEM (API gratuita Pollinations) =====
async function gerarImagemColorir(promptUsuario) {
    const valid = validarPromptArte(promptUsuario);
    if (!valid.ok) return valid.msg;
    
    // Criar prompt adequado para colorir
    const prompt = `black and white outline drawing, coloring page for kids, simple line art, ${promptUsuario}, thick clear lines, no shading, white background, child friendly`;
    const encodedPrompt = encodeURIComponent(prompt);
    const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true`;
    
    const img = document.getElementById("imagemGerada");
    img.src = imageUrl;
    img.style.display = "block";
    img.alt = `Desenho: ${promptUsuario}`;
    
    // Rolar até a imagem
    img.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    return "🎨 Aqui está um desenho especial para você colorir! Use lápis de cor, giz de cera ou canetinhas. Solte sua criatividade! 🖍️";
}

// ===== RESPOSTA DO CANDINHO =====
async function getResposta(pergunta) {
    if (!engine || !isReady) {
        return "Aguarde um pouquinho, ainda estou preparando minha paleta de cores... 🎨";
    }
    
    try {
        const messages = [
            {
                role: "system",
                content: `Você é o Candinho, um professor de arte muito querido de 60 anos.
- Fala português do Brasil de forma clara e educativa
- Ensina crianças de 10 anos sobre arte, pintura, artistas famosos e cultura
- É paciente, divertido e usa emojis 🎨😊✨
- SEMPRE responde como se estivesse conversando com uma criança curiosa
- Explica conceitos de arte de forma simples e interessante
- Fala sobre: Van Gogh, Monet, Leonardo da Vinci, Picasso, Tarsila do Amaral, Portinari
- Ensina sobre cores, formas, técnicas de desenho
- Se não souber algo, diz "Que pergunta interessante! Vamos pesquisar juntos na próxima aula!"
- NUNCA fala sobre violência, política ou assuntos adultos
- As respostas são curtas (máximo 3 frases) para manter a atenção`
            },
            { role: "user", content: pergunta }
        ];
        
        const reply = await engine.chat.completions.create({
            messages: messages,
            max_tokens: 100,
            temperature: 0.7
        });
        
        let resposta = reply.choices[0].message.content;
        
        // Garantir que tenha emojis amigáveis
        if (!resposta.includes('🎨') && !resposta.includes('😊')) {
            resposta += " 🎨";
        }
        
        return resposta;
        
    } catch (error) {
        console.error("Erro na IA:", error);
        return "Ops! Minha tinta acabou por um momento. Pode repetir a pergunta? 🎨";
    }
}

// ===== ADICIONAR MENSAGEM AO CHAT =====
function addMessage(text, isUser = false) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
    
    if (isUser) {
        div.innerHTML = `<div><b>Você</b><br>${text}</div>`;
    } else {
        div.innerHTML = `<div><b>Candinho</b><br>${text}</div>`;
    }
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ===== ENVIAR MENSAGEM =====
window.enviarMensagem = async function() {
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    const pergunta = input.value.trim();
    if (!pergunta || !isReady) return;
    
    // Desabilitar durante processamento
    input.disabled = true;
    sendBtn.disabled = true;
    
    // Mostrar mensagem do usuário
    addMessage(pergunta, true);
    input.value = "";
    
    // Esconder imagem anterior
    const img = document.getElementById("imagemGerada");
    img.style.display = "none";
    
    // Indicador de digitação
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg ai-msg";
    typingDiv.id = "typingIndicator";
    typingDiv.innerHTML = `<div><b>Candinho</b><br><span class="typing">Pensando<span>.</span><span>.</span><span>.</span></span></div>`;
    document.getElementById("chat").appendChild(typingDiv);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    
    let resposta;
    
    try {
        if (ehPedidoDeImagem(pergunta)) {
            const imgResposta = await gerarImagemColorir(pergunta);
            const textoResposta = await getResposta(pergunta);
            resposta = imgResposta + "<br><br>" + textoResposta;
        } else {
            resposta = await getResposta(pergunta);
        }
    } catch (error) {
        console.error("Erro:", error);
        resposta = "Xiii, tive um probleminha técnico! Vamos tentar de novo? 🎨";
    }
    
    // Remover indicador
    typingDiv.remove();
    
    // Adicionar resposta
    addMessage(resposta, false);
    
    // Reabilitar
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
}

// ===== INICIALIZAR MODELO =====
async function initModel() {
    const statusDiv = document.getElementById("status");
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    try {
        statusDiv.innerHTML = "📥 Baixando o modelo de IA (TinyLlama)... Isso pode levar alguns segundos na primeira vez...";
        
        // Modelo leve que funciona no WebLLM
        const modelId = "TinyLlama-1.1B-Chat-v0.4-q4f32_1-1k";
        
        engine = await webllm.CreateMLCEngine(modelId, { 
            initProgressCallback: (progress) => {
                if (progress.text) {
                    statusDiv.innerHTML = `📥 ${progress.text}`;
                }
            }
        });
        
        isReady = true;
        statusDiv.innerHTML = "✅ Candinho está pronto! Pode fazer suas perguntas sobre arte! 🎨";
        statusDiv.style.background = "#2d6a4f";
        
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        
        // Mensagem de boas-vindas adicional
        setTimeout(() => {
            addMessage("Que bom ter você aqui! Pode me perguntar sobre artistas famosos, técnicas de desenho, ou me pedir: 'Me desenhe um gato para colorir'! 🐱✏️", false);
        }, 1500);
        
    } catch (error) {
        console.error("Erro:", error);
        statusDiv.innerHTML = "❌ Erro ao carregar o modelo. Recarregue a página para tentar novamente.";
        statusDiv.style.background = "#e94560";
    }
}

// Iniciar tudo
initModel();

// Enter para enviar
document.getElementById("pergunta").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && isReady && !this.disabled) {
        enviarMensagem();
    }
});

</script>

</body>
</html>
