<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - IA de Arte</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white; 
    padding: 20px; 
    display: flex; 
    justify-content: center;
    min-height: 100vh;
}

.container { 
    width: 100%; 
    max-width: 800px; 
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px; 
    padding: 25px; 
}

.header { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 20px; 
}

.avatar { 
    width: 70px; 
    height: 70px; 
    border-radius: 50%; 
    background: #533483;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    border: 3px solid #ffd700;
}

.title h1 { font-size: 1.8em; }

#chat { 
    height: 400px; 
    overflow-y: auto; 
    background: rgba(15, 52, 96, 0.6);
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 15px; 
}

.input-area { display: flex; gap: 10px; }

input { 
    flex: 1; 
    padding: 14px; 
    border-radius: 30px; 
    border: none; 
    background: #0f3460;
    color: white;
}

input::placeholder {
    color: #88aacc;
}

button { 
    padding: 14px 25px; 
    border-radius: 30px; 
    background: #e94560; 
    color: white; 
    border: none; 
    cursor: pointer; 
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.02);
}

button:disabled {
    background: #666;
    cursor: not-allowed;
    transform: none;
}

.msg { 
    margin-bottom: 15px; 
    padding: 12px; 
    border-radius: 15px; 
    word-wrap: break-word;
}

.user-msg { 
    background: #1b6ca8; 
    margin-left: 40px;
}

.ai-msg { 
    background: #533483; 
}

.status {
    background: #0f3460;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-align: center;
    font-size: 0.9em;
}

.status.success {
    background: #2d6a4f;
}

.status.error {
    background: #e94560;
}

.typing {
    display: inline-block;
    width: 20px;
    text-align: left;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.typing span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

#imagemGerada {
    max-width: 100%;
    max-height: 300px;
    border-radius: 10px;
    display: none;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="avatar">🎨</div>
    <div class="title">
        <h1>Candinho 🎨</h1>
        <small>Seu amigo artista</small>
    </div>
</div>

<div id="status" class="status">🔧 Inicializando Candinho...</div>

<div id="chat">
    <div class="msg ai-msg">
        <div>
        <b>Candinho</b><br>
        Olá! Que bom te ver por aqui. O que vamos aprender sobre Arte hoje? 😊
        </div>
    </div>
</div>

<div id="areaImagem">
    <img id="imagemGerada" alt="Desenho gerado">
</div>

<div class="input-area">
    <input id="pergunta" placeholder="Ex: Quem foi Van Gogh? ou Me desenhe um dinossauro..." disabled>
    <button onclick="enviarMensagem()" id="sendBtn" disabled>Enviar</button>
</div>

</div>

<script>
async function verificarBackend() {
    const statusDiv = document.getElementById('status');
    const input = document.getElementById('pergunta');
    const sendBtn = document.getElementById('sendBtn');
    
    try {
        const response = await fetch('/api/health');
        const data = await response.json();
        
        if (response.ok && data.status === 'ok') {
            statusDiv.innerHTML = '✅ Candinho está pronto! Pode perguntar sobre arte! 🎨';
            statusDiv.className = 'status success';
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        } else {
            throw new Error('Backend não respondeu corretamente');
        }
    } catch (error) {
        statusDiv.innerHTML = '❌ Erro ao conectar com o servidor. Recarregue a página.';
        statusDiv.className = 'status error';
        input.disabled = true;
        sendBtn.disabled = true;
    }
}

function ehPedidoDeImagem(texto) {
    const palavras = ["desenho", "colorir", "imagem", "ilustração", "desenha", "pintar", "faça um", "crie um", "desenhe"];
    return palavras.some(p => texto.toLowerCase().includes(p));
}

function addMessage(text, isUser = false) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
    
    if (isUser) {
        div.innerHTML = `<div><b>Você</b><br>${text}</div>`;
    } else {
        div.innerHTML = `<div><b>Candinho</b><br>${text}</div>`;
    }
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.enviarMensagem = async function() {
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    const pergunta = input.value.trim();
    if (!pergunta) return;
    
    input.disabled = true;
    sendBtn.disabled = true;
    
    addMessage(pergunta, true);
    input.value = "";
    
    const img = document.getElementById("imagemGerada");
    img.style.display = "none";
    
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg ai-msg";
    typingDiv.id = "typingIndicator";
    typingDiv.innerHTML = `<div><b>Candinho</b><br><span class="typing">Pensando<span>.</span><span>.</span><span>.</span></span></div>`;
    document.getElementById("chat").appendChild(typingDiv);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    
    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: pergunta,
                gerarImagem: ehPedidoDeImagem(pergunta)
            })
        });
        
        const data = await response.json();
        
        typingDiv.remove();
        
        if (data.imagem) {
            const img = document.getElementById("imagemGerada");
            img.src = data.imagem;
            img.style.display = "block";
        }
        
        addMessage(data.resposta, false);
        
    } catch (error) {
        console.error('Erro:', error);
        typingDiv.remove();
        addMessage("Ops! Tive um problema técnico. Tente novamente! 🎨", false);
    }
    
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
}

verificarBackend();

document.getElementById("pergunta").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !this.disabled) {
        enviarMensagem();
    }
});
</script>

</body>
</html>
