<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho Desenhista</title>
<link rel="icon" href="https://i.imgur.com/fnMYS0Z.png">
    
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 800px;
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px;
    padding: 25px;
    backdrop-filter: blur(5px);
    text-align: center;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #ffd700;
    background: #533483;
    margin-bottom: 15px;
}

h1 {
    font-size: 2em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
}

.subtitle {
    color: #ddd;
    margin-bottom: 30px;
    font-style: italic;
}

.input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: #0f3460;
    color: white;
    outline: none;
    font-size: 1em;
}

button {
    padding: 14px 25px;
    border-radius: 30px;
    background: #e94560;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#imagemGerada {
    max-width: 100%;
    max-height: 400px;
    border-radius: 15px;
    display: none;
    margin: 20px auto;
    background: white;
}

.loading {
    display: none;
    margin: 20px auto;
    color: #ffd700;
}
</style>
</head>

<body>
<div class="container">

    <img src="https://i.imgur.com/fnMYS0Z.png"
         class="avatar"
         alt="Candinho">

    <h1>Candinho Desenhista 🖍️</h1>
    <div class="subtitle">🎨 Sou seu guia no desenho!</div>

    <div class="input-area">
        <input type="text" id="descricao"
               placeholder="Ex: mapa do Brasil, dinossauro fofo...">
        <button id="gerarBtn">🎨 Gerar desenho</button>
    </div>

    <div class="loading" id="loading">
        ✏️ Criando desenho...
    </div>

    <img id="imagemGerada">

</div>

<script>
document.getElementById("gerarBtn").addEventListener("click", gerarDesenho);

async function gerarDesenho() {

    const descricao = document.getElementById("descricao").value.trim();
    if (!descricao) return;

    // filtro infantil
    const proibidas = ["arma", "sangue", "violencia", "terror"];
    if (proibidas.some(p => descricao.toLowerCase().includes(p))) {
        alert("Vamos desenhar coisas seguras 😄");
        return;
    }

    const btn = document.getElementById("gerarBtn");
    const loading = document.getElementById("loading");
    const img = document.getElementById("imagemGerada");

    btn.disabled = true;
    loading.style.display = "block";
    img.style.display = "none";

    try {
        const promptFinal = `${descricao}, kids coloring book, black and white line art, thick outline, clean lines, no shading`;

        const response = await fetch("/api/imagem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: promptFinal })
        });

        const data = await response.json();

        if (data.imagem) {
            img.src = data.imagem;
            img.style.display = "block";
        } else {
            alert("Não veio imagem 😅");
        }

    } catch (err) {
        console.error(err);
        alert("Erro ao gerar imagem");
    }

    btn.disabled = false;
    loading.style.display = "none";
}
</script>

</body>
</html>
