<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho Desenhista</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 800px;
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px;
    padding: 25px;
    backdrop-filter: blur(5px);
    text-align: center;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #ffd700;
    background: #533483;
    margin-bottom: 15px;
}

h1 {
    font-size: 2em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
}

.subtitle {
    color: #ddd;
    margin-bottom: 30px;
    font-style: italic;
}

.input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: #0f3460;
    color: white;
    outline: none;
    font-size: 1em;
}

button {
    padding: 14px 25px;
    border-radius: 30px;
    background: #e94560;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
}

button:hover:not(:disabled) {
    transform: scale(1.05);
    background: #ff6b8a;
}

button:disabled {
    background: #666;
    cursor: not-allowed;
}

#imagemGerada {
    max-width: 100%;
    max-height: 400px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    display: none;
    margin: 20px auto;
    background: white;
}

.loading {
    display: none;
    margin: 20px auto;
    font-size: 1.2em;
    color: #ffd700;
    text-align: center;
}

.loading span {
    animation: blink 1.4s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.dica {
    background: rgba(255,215,0,0.2);
    padding: 12px;
    border-radius: 15px;
    margin-top: 20px;
    font-size: 0.9em;
}
</style>
</head>

<body>
<div class="container">

    <img src="https://i.imgur.com/fnMYS0Z.png"
         class="avatar"
         alt="Candinho"
         onerror="this.src='https://via.placeholder.com/80/533483/ffd700?text=C'">

    <h1>Candinho Desenhista 🖍️</h1>
    <div class="subtitle">🎨 Sou seu guia no desenho!</div>

    <div class="input-area">
        <input type="text" id="descricao"
               placeholder="Ex: mapa do Brasil, dinossauro fofo, castelo de princesa...">
        <button id="gerarBtn">🎨 Gerar desenho</button>
    </div>

    <div class="loading" id="loading">
        <span>✏️</span> Criando seu desenho<span>.</span><span>.</span><span>.</span>
    </div>

    <img id="imagemGerada" alt="Desenho gerado por IA">

    <div class="dica">
        💡 Peça desenhos simples para colorir: animais, mapas, personagens...
    </div>

</div>

<script>

// eventos
document.getElementById("gerarBtn").addEventListener("click", gerarDesenho);
document.getElementById("descricao").addEventListener("keypress", function(e) {
    if (e.key === "Enter") gerarDesenho();
});

async function gerarDesenho() {

    const input = document.getElementById("descricao");
    const descricao = input.value.trim();

    if (!descricao) {
        alert("Digite algo para desenhar 🙂");
        return;
    }

    // 🔒 filtro infantil
    const proibidas = ["arma", "sangue", "violencia", "terror"];
    if (proibidas.some(p => descricao.toLowerCase().includes(p))) {
        alert("Vamos desenhar coisas seguras 😄");
        return;
    }

    const btn = document.getElementById("gerarBtn");
    const loading = document.getElementById("loading");
    const img = document.getElementById("imagemGerada");

    btn.disabled = true;
    loading.style.display = "block";
    img.style.display = "none";
    img.src = "";

    try {

        // 🎨 prompt otimizado
        const promptFinal = `${descricao}, desenho para colorir, preto e branco, linhas simples, contorno grosso, estilo infantil`;

        const response = await fetch("/api/imagem", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: promptFinal })
        });

        if (!response.ok) {
            throw new Error("Erro na API");
        }

        const data = await response.json();
        console.log("Resposta da API:", data);

        if (data.imagem || data.url) {
            img.src = data.imagem || data.url;
            img.style.display = "block";
        } else {
            alert("A IA respondeu, mas não trouxe imagem 😅");
        }

    } catch (error) {
        console.error(error);
        alert("Erro ao gerar imagem. Pressione F12 para ver detalhes.");
    } finally {
        btn.disabled = false;
        loading.style.display = "none";
    }
}

</script>
</body>
</html>
