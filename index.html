<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - IA de Arte</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white; 
    padding: 20px; 
    display: flex; 
    justify-content: center;
    min-height: 100vh;
}

.container { 
    width: 100%; 
    max-width: 800px; 
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px; 
    padding: 25px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.header { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 20px; 
    padding-bottom: 15px;
    border-bottom: 2px solid #ffd700;
}

.avatar { 
    width: 70px; 
    height: 70px; 
    border-radius: 50%; 
    object-fit: cover;
    border: 3px solid #ffd700;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
    background: #533483;
}

.title h1 { 
    font-size: 1.8em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.title small {
    opacity: 0.8;
    font-size: 0.85em;
}

#chat { 
    height: 400px; 
    overflow-y: auto; 
    background: rgba(15, 52, 96, 0.4);
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 15px;
    scroll-behavior: smooth;
}

.input-area { 
    display: flex; 
    gap: 10px; 
    margin-top: 10px;
}

input { 
    flex: 1; 
    padding: 14px 20px; 
    border-radius: 30px; 
    border: none; 
    background: #0f3460;
    color: white;
    font-size: 16px;
    transition: all 0.3s;
}

input:focus {
    outline: none;
    background: #1a4580;
    box-shadow: 0 0 0 2px #ffd700;
}

input::placeholder {
    color: #88aacc;
}

button { 
    padding: 14px 30px; 
    border-radius: 30px; 
    background: linear-gradient(135deg, #e94560, #c73e56);
    color: white; 
    border: none; 
    cursor: pointer; 
    font-weight: bold;
    transition: all 0.3s;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(233,69,96,0.4);
}

button:active {
    transform: translateY(0);
}

button:disabled {
    background: #666;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.msg { 
    margin-bottom: 15px; 
    padding: 12px 15px; 
    border-radius: 15px; 
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.user-msg { 
    background: linear-gradient(135deg, #1b6ca8, #155a8c);
    margin-left: 40px;
    border-bottom-right-radius: 5px;
}

.ai-msg { 
    background: linear-gradient(135deg, #533483, #3d2668);
    margin-right: 40px;
    border-bottom-left-radius: 5px;
}

.status {
    background: #0f3460;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-align: center;
    font-size: 0.9em;
    transition: all 0.3s;
}

.status.success {
    background: linear-gradient(135deg, #2d6a4f, #1b4d3a);
}

.status.error {
    background: linear-gradient(135deg, #e94560, #c73e56);
}

.status.loading {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #1a1a2e;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

.typing {
    display: inline-block;
}

.typing span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

#imagemGerada {
    max-width: 100%;
    max-height: 300px;
    border-radius: 10px;
    display: none;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    animation: fadeIn 0.5s ease;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/fnMYS0Z.png" class="avatar" alt="Candinho" onerror="this.src='https://via.placeholder.com/70/533483/ffd700?text=Candinho'">
    <div class="title">
        <h1>Candinho 🎨</h1>
        <small>Seu amigo artista - IA no seu navegador</small>
    </div>
</div>

<div id="status" class="status loading">🎨 Inicializando Candinho...</div>

<div id="chat">
    <div class="msg ai-msg">
        <div>
        <b>Candinho</b><br>
        Olá! Que bom te ver por aqui. O que vamos aprender sobre Arte hoje? 😊<br>
        <small style="opacity:0.7;">💡 Dica: Digite "Me desenhe um [animal/objeto]" para ganhar uma imagem para colorir!</small>
        </div>
    </div>
</div>

<div id="areaImagem">
    <img id="imagemGerada" alt="Desenho gerado">
</div>

<div class="input-area">
    <input id="pergunta" placeholder="Ex: Quem foi Van Gogh? ou Me desenhe um dinossauro..." disabled>
    <button onclick="enviarMensagem()" id="sendBtn" disabled>📤 Enviar</button>
</div>

</div>

<script type="importmap">
  {
    "imports": {
      "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm@0.2.56"
    }
  }
</script>

<script type="module">
import * as webllm from "@mlc-ai/web-llm";

let engine = null;
let isReady = false;

// ===== FILTRO =====
function validarPromptArte(input) {
    const proibidos = ["violência","arma","sexo","nudez","droga","morte","sangue","assassino"];
    const t = input.toLowerCase();
    
    if (proibidos.some(p => t.includes(p))) {
        return { ok: false, msg: "🚫 Esse tema não é apropriado, meu jovem. Vamos falar de arte bonita e educativa!" };
    }
    return { ok: true };
}

function ehPedidoDeImagem(texto) {
    const palavras = ["desenho", "colorir", "imagem", "ilustração", "desenha", "pintar", "faça um", "crie um", "desenhe", "me desenhe"];
    return palavras.some(p => texto.toLowerCase().includes(p));
}

// ===== GERAR IMAGEM =====
async function gerarImagemColorir(promptUsuario) {
    const valid = validarPromptArte(promptUsuario);
    if (!valid.ok) return valid.msg;
    
    const prompt = `black and white outline drawing, coloring page for kids, simple line art, ${promptUsuario}, thick clear lines, no shading, white background, child friendly, cute`;
    const encodedPrompt = encodeURIComponent(prompt);
    const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true`;
    
    const img = document.getElementById("imagemGerada");
    img.src = imageUrl;
    img.style.display = "block";
    img.alt = `Desenho: ${promptUsuario}`;
    
    img.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    return "🎨 Aqui está um desenho especial para você colorir! Use sua criatividade! 🖍️✨";
}

// ===== RESPOSTA IA (USANDO API PÚBLICA GRATUITA) =====
// Como o WebLLM está dando erro, vamos usar uma API pública gratuita
async function getResposta(pergunta) {
    try {
        // Usando API gratuita do Hugging Face (sem necessidade de chave para modelos pequenos)
        const response = await fetch('https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                inputs: pergunta,
                parameters: {
                    max_length: 100,
                    temperature: 0.7
                }
            })
        });
        
        if (response.ok) {
            const data = await response.json();
            let resposta = data.generated_text || data[0]?.generated_text;
            
            if (resposta && resposta.length > 10) {
                // Limpar a resposta
                resposta = resposta.replace(pergunta, '').trim();
                if (resposta.length > 5) {
                    return resposta + " 🎨";
                }
            }
        }
        
        // Fallback: respostas pré-definidas para não ficar sem resposta
        const respostas = [
            "Que pergunta legal! Van Gogh foi um pintor holandês que criou obras incríveis como 'Noite Estrelada'! 🌟",
            "Sabia que as cores primárias são vermelho, azul e amarelo? Com elas podemos criar todas as outras cores! 🎨",
            "Leonardo da Vinci pintou a Mona Lisa, um dos quadros mais famosos do mundo! 🖼️",
            "Tarsila do Amaral foi uma grande artista brasileira que pintou o 'Abaporu'! 🇧🇷",
            "O desenho é uma forma maravilhosa de expressar sua criatividade. Continue praticando! ✏️"
        ];
        
        return respostas[Math.floor(Math.random() * respostas.length)];
        
    } catch (error) {
        console.error("Erro na API:", error);
        
        // Fallback local
        return "Isso é uma ótima pergunta sobre arte! Continue explorando sua criatividade! 🎨";
    }
}

// ===== MENSAGEM =====
function addMessage(text, isUser = false) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
    
    const nome = isUser ? 'Você' : 'Candinho';
    
    div.innerHTML = `<div><b>${nome}</b><br>${text}</div>`;
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ===== ENVIAR MENSAGEM =====
window.enviarMensagem = async function() {
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    const pergunta = input.value.trim();
    if (!pergunta) return;
    
    // Desabilitar durante processamento
    input.disabled = true;
    sendBtn.disabled = true;
    
    // Mostrar mensagem do usuário
    addMessage(pergunta, true);
    input.value = "";
    
    // Esconder imagem anterior
    const img = document.getElementById("imagemGerada");
    img.style.display = "none";
    
    // Indicador de digitação
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg ai-msg";
    typingDiv.id = "typingIndicator";
    typingDiv.innerHTML = `<div><b>Candinho</b><br><span class="typing">✍️ Pensando<span>.</span><span>.</span><span>.</span></span></div>`;
    document.getElementById("chat").appendChild(typingDiv);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    
    let resposta;
    
    try {
        if (ehPedidoDeImagem(pergunta)) {
            const imgResposta = await gerarImagemColorir(pergunta);
            const textoResposta = await getResposta(pergunta);
            resposta = imgResposta + "<br><br>" + textoResposta;
        } else {
            resposta = await getResposta(pergunta);
        }
    } catch (error) {
        console.error("Erro:", error);
        resposta = "Xiii, tive um probleminha técnico! Vamos tentar de novo? 🎨";
    }
    
    // Remover indicador
    typingDiv.remove();
    
    // Adicionar resposta
    addMessage(resposta, false);
    
    // Reabilitar
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
}

// ===== INICIALIZAR =====
async function init() {
    const statusDiv = document.getElementById("status");
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    // Simular carregamento rápido
    setTimeout(() => {
        statusDiv.innerHTML = "✅ Candinho está pronto! Pode fazer suas perguntas sobre arte! 🎨";
        statusDiv.className = "status success";
        
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        
        // Mensagem de boas-vindas
        setTimeout(() => {
            addMessage("Que bom ter você aqui! Pode me perguntar sobre artistas famosos, cores, técnicas de desenho, ou me pedir: 'Me desenhe um gato para colorir'! 🐱✏️", false);
        }, 1000);
    }, 1500);
}

// Iniciar
init();

// Suporte para tecla Enter
document.getElementById("pergunta").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !this.disabled) {
        e.preventDefault();
        enviarMensagem();
    }
});

</script>

</body>
</html>
