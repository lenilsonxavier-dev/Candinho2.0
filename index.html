<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - IA de Arte</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white; 
    padding: 20px; 
    display: flex; 
    justify-content: center;
    min-height: 100vh;
}

.container { 
    width: 100%; 
    max-width: 800px; 
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px; 
    padding: 25px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.header { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 20px; 
    padding-bottom: 15px;
    border-bottom: 2px solid #ffd700;
}

.avatar { 
    width: 70px; 
    height: 70px; 
    border-radius: 50%; 
    object-fit: cover;
    border: 3px solid #ffd700;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
    background: #533483;
}

.title h1 { 
    font-size: 1.8em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.title small {
    opacity: 0.8;
    font-size: 0.85em;
}

#chat { 
    height: 400px; 
    overflow-y: auto; 
    background: rgba(15, 52, 96, 0.4);
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 15px;
    scroll-behavior: smooth;
}

.input-area { 
    display: flex; 
    gap: 10px; 
    margin-top: 10px;
}

input { 
    flex: 1; 
    padding: 14px 20px; 
    border-radius: 30px; 
    border: none; 
    background: #0f3460;
    color: white;
    font-size: 16px;
    transition: all 0.3s;
}

input:focus {
    outline: none;
    background: #1a4580;
    box-shadow: 0 0 0 2px #ffd700;
}

input::placeholder {
    color: #88aacc;
}

button { 
    padding: 14px 30px; 
    border-radius: 30px; 
    background: linear-gradient(135deg, #e94560, #c73e56);
    color: white; 
    border: none; 
    cursor: pointer; 
    font-weight: bold;
    transition: all 0.3s;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(233,69,96,0.4);
}

button:active {
    transform: translateY(0);
}

button:disabled {
    background: #666;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.msg { 
    margin-bottom: 15px; 
    padding: 12px 15px; 
    border-radius: 15px; 
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.user-msg { 
    background: linear-gradient(135deg, #1b6ca8, #155a8c);
    margin-left: 40px;
    border-bottom-right-radius: 5px;
}

.ai-msg { 
    background: linear-gradient(135deg, #533483, #3d2668);
    margin-right: 40px;
    border-bottom-left-radius: 5px;
}

.status {
    background: #0f3460;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-align: center;
    font-size: 0.9em;
    transition: all 0.3s;
}

.status.success {
    background: linear-gradient(135deg, #2d6a4f, #1b4d3a);
}

.status.error {
    background: linear-gradient(135deg, #e94560, #c73e56);
}

.status.loading {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #1a1a2e;
}

.typing {
    display: inline-block;
}

.typing span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

#imagemGerada {
    max-width: 100%;
    max-height: 300px;
    border-radius: 10px;
    display: none;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    animation: fadeIn 0.5s ease;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/fnMYS0Z.png" class="avatar" alt="Candinho" onerror="this.src='https://via.placeholder.com/70/533483/ffd700?text=C'">
    <div class="title">
        <h1>Candinho 🎨</h1>
        <small>Seu amigo artista</small>
    </div>
</div>

<div id="status" class="status success">✅ Candinho está pronto!</div>

<div id="chat">
    <div class="msg ai-msg">
        <div>
        <b>Candinho</b><br>
        Olá! Que bom te ver por aqui. O que vamos aprender sobre Arte hoje? 😊<br>
        <small style="opacity:0.7;">💡 Dica: Digite "desenhe um gato" para ganhar uma imagem para colorir!</small>
        </div>
    </div>
</div>

<div id="areaImagem">
    <img id="imagemGerada" alt="Desenho gerado">
</div>

<div class="input-area">
    <input id="pergunta" placeholder="Ex: Quem foi Van Gogh? ou desenhe um dinossauro..." />
    <button onclick="enviarMensagem()" id="sendBtn">📤 Enviar</button>
</div>

</div>

<script>
// Banco de conhecimento do Candinho
const conhecimento = {
    // Artistas
    "van gogh": "Van Gogh foi um pintor holandês que criou obras incríveis como 'Noite Estrelada' e 'Girassóis'! Ele usava cores vibrantes e pinceladas fortes. 🌟🎨",
    "monet": "Claude Monet foi um dos fundadores do Impressionismo! Ele pintava muitas flores, jardins e a famosa série 'Nenúfares'. 🌸🎨",
    "leonardo da vinci": "Leonardo da Vinci foi um gênio! Além de pintar a Mona Lisa, ele também era inventor, cientista e desenhava máquinas incríveis! ✨🎨",
    "picasso": "Picasso foi um artista espanhol que criou o Cubismo! Ele pintava as pessoas de formas geométricas e cores diferentes. Muito criativo! 🎭🎨",
    "tarsila": "Tarsila do Amaral foi uma grande artista brasileira! Ela pintou 'Abaporu' e ajudou a criar o movimento modernista no Brasil. 🇧🇷🎨",
    "portinari": "Candido Portinari pintou a vida do povo brasileiro! Suas obras mostram crianças, café e a cultura do nosso país. ☕🇧🇷",
    // Cores
    "cores primárias": "As cores primárias são vermelho, azul e amarelo! Com elas podemos misturar e criar todas as outras cores. Que mágico! 🔴🔵🟡",
    "cores secundárias": "Verde (azul+amarelo), laranja (vermelho+amarelo) e roxo (azul+vermelho)! Experimente misturar! 🟢🟠🟣",
    // Técnicas
    "desenhar": "Para desenhar bem, pratique todos os dias! Comece com formas simples: círculos, quadrados e triângulos. ✏️",
    "pintar": "Pintar é uma forma maravilhosa de expressar sentimentos! Use pincéis, lápis de cor ou até os dedos! 🖌️",
    // Educação
    "porque a arte": "A arte nos ajuda a expressar sentimentos, contar histórias e ver o mundo de formas diferentes! É muito importante! 💭🎨",
    "arte rupestre": "Arte rupestre são desenhos feitos nas paredes das cavernas há milhares de anos! Eles mostravam animais e cenas do dia a dia. 🦌🪨"
};

// Respostas genéricas para outras perguntas
const respostasGenericas = [
    "Que pergunta interessante! Na arte, podemos explorar nossa imaginação sem limites! 🎨✨",
    "Isso me lembra que a arte está em todos os lugares! Você já observou as cores do pôr do sol? 🌅",
    "Arte é sobre expressão! Cada pessoa vê o mundo de um jeito único. Continue curioso! 😊",
    "Que legal você perguntar isso! A arte nos ensina a observar o mundo com mais atenção. 🖼️",
    "Sabia que até um rabisco pode ser arte? O importante é se divertir criando! ✏️",
    "A criatividade mora dentro de cada um de nós! Você já tentou desenhar o que vê pela janela? 🪟",
    "Arte também é sobre praticar! Quanto mais você desenha, melhor fica! Continue tentando! 💪"
];

function getRespostaInteligente(pergunta) {
    const perguntaLower = pergunta.toLowerCase();
    
    // Verificar se é uma pergunta sobre artista específico
    for (const [key, resposta] of Object.entries(conhecimento)) {
        if (perguntaLower.includes(key)) {
            return resposta;
        }
    }
    
    // Verificar perguntas comuns
    if (perguntaLower.includes("quem foi") || perguntaLower.includes("o que é")) {
        return "Essa é uma ótima pergunta! Na arte, existem muitos artistas incríveis. Quer saber sobre Van Gogh, Monet, Picasso ou Tarsila? 🎨";
    }
    
    if (perguntaLower.includes("como") && (perguntaLower.includes("desenhar") || perguntaLower.includes("pintar"))) {
        return "Para aprender a desenhar, comece observando formas simples! Um gato é feito de círculos, um cachorro de ovais. Pratique todo dia! ✏️😊";
    }
    
    if (perguntaLower.includes("cor") || perguntaLower.includes("colorir")) {
        return "As cores são mágicas! Sabia que o vermelho e o amarelo formam o laranja? Experimente misturar tintas! 🎨🌈";
    }
    
    // Resposta aleatória para outras perguntas
    return respostasGenericas[Math.floor(Math.random() * respostasGenericas.length)];
}

function ehPedidoDeImagem(texto) {
    const palavras = ["desenho", "colorir", "desenha", "desenhe", "imagem", "ilustração", "pintar"];
    return palavras.some(p => texto.toLowerCase().includes(p));
}

async function gerarImagemColorir(promptUsuario) {
    try {
        // Remover palavras comuns para melhorar o prompt
        let tema = promptUsuario.toLowerCase();
        tema = tema.replace("desenhe", "").replace("desenho", "").replace("colorir", "").replace("me", "").trim();
        
        if (!tema) tema = "feliz";
        
        const prompt = `black and white outline drawing, coloring page for kids, simple line art, ${tema}, thick clear lines, no shading, white background, cute, child friendly`;
        const encodedPrompt = encodeURIComponent(prompt);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true`;
        
        const img = document.getElementById("imagemGerada");
        img.src = imageUrl;
        img.style.display = "block";
        img.alt = `Desenho: ${tema}`;
        
        img.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        return `🎨 Aqui está um desenho de ${tema} para você colorir! Use lápis de cor ou giz de cera e solte a imaginação! 🖍️✨`;
        
    } catch (error) {
        console.error("Erro ao gerar imagem:", error);
        return "Não consegui gerar a imagem agora, mas podemos conversar sobre arte! 🎨";
    }
}

function addMessage(text, isUser = false) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
    
    const nome = isUser ? 'Você' : 'Candinho';
    
    div.innerHTML = `<div><b>${nome}</b><br>${text}</div>`;
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.enviarMensagem = async function() {
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    const pergunta = input.value.trim();
    if (!pergunta) return;
    
    // Desabilitar durante processamento
    input.disabled = true;
    sendBtn.disabled = true;
    
    // Mostrar mensagem do usuário
    addMessage(pergunta, true);
    input.value = "";
    
    // Esconder imagem anterior
    const img = document.getElementById("imagemGerada");
    img.style.display = "none";
    
    // Indicador de digitação
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg ai-msg";
    typingDiv.id = "typingIndicator";
    typingDiv.innerHTML = `<div><b>Candinho</b><br><span class="typing">✍️ Pensando<span>.</span><span>.</span><span>.</span></span></div>`;
    document.getElementById("chat").appendChild(typingDiv);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    
    // Pequena pausa para parecer natural
    await new Promise(resolve => setTimeout(resolve, 800));
    
    let resposta;
    
    try {
        if (ehPedidoDeImagem(pergunta)) {
            const imgResposta = await gerarImagemColorir(pergunta);
            const textoResposta = getRespostaInteligente(pergunta);
            resposta = imgResposta + "<br><br>" + textoResposta;
        } else {
            resposta = getRespostaInteligente(pergunta);
        }
    } catch (error) {
        console.error("Erro:", error);
        resposta = "Xiii, tive um probleminha! Vamos tentar de novo? 🎨";
    }
    
    // Remover indicador
    typingDiv.remove();
    
    // Adicionar resposta
    addMessage(resposta, false);
    
    // Reabilitar
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
}

// Suporte para tecla Enter
document.getElementById("pergunta").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        enviarMensagem();
    }
});
</script>

</body>
</html>
