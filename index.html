<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - IA de Arte</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white; 
    padding: 20px; 
    display: flex; 
    justify-content: center;
    min-height: 100vh;
}

.container { 
    width: 100%; 
    max-width: 800px; 
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px; 
    padding: 25px; 
}

.header { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 20px; 
}

.avatar { 
    width: 70px; 
    height: 70px; 
    border-radius: 50%; 
    object-fit: cover; 
    border: 3px solid #ffd700;
}

.title h1 { font-size: 1.8em; }

#chat { 
    height: 400px; 
    overflow-y: auto; 
    background: rgba(15, 52, 96, 0.6);
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 15px; 
}

.input-area { display: flex; gap: 10px; }

input { 
    flex: 1; 
    padding: 14px; 
    border-radius: 30px; 
    border: none; 
    background: #0f3460;
    color: white;
}

button { 
    padding: 14px 25px; 
    border-radius: 30px; 
    background: #e94560; 
    color: white; 
    border: none; 
    cursor: pointer; 
}

.msg { margin-bottom: 15px; padding: 12px; border-radius: 15px; }
.user-msg { background: #1b6ca8; }
.ai-msg { background: #533483; }

.msg-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

#areaImagem {
    margin-top: 10px;
    text-align: center;
}

#imagemGerada {
    max-width: 100%;
    border-radius: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/fnMYS0Z.png" class="avatar">
    <div class="title">
        <h1>Candinho 🎨</h1>
        <small>Seu amigo artista</small>
    </div>
</div>

<div id="chat">
    <div class="msg ai-msg">
        <img src="https://i.imgur.com/fnMYS0Z.png" class="msg-avatar">
        <div>
        <b>Candinho</b><br>
        Olá, meu jovem! 😊 Vamos aprender arte juntos hoje?
        </div>
    </div>
</div>

<div id="areaImagem">
    <img id="imagemGerada">
</div>

<div class="input-area">
    <input id="pergunta" placeholder="Pergunte sobre arte ou peça um desenho...">
    <button onclick="enviarMensagem()">Enviar</button>
</div>

</div>

<script type="module">

import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm@0.2.56";

let engine = null;

// ===== FILTRO =====
function validarPromptArte(input) {
    const proibidos = ["violência","arma","sexo","nudez"];
    const temas = ["arte","museu","pintura","escultura","desenho","mapa","monumento","artista"];

    const t = input.toLowerCase();

    if (proibidos.some(p => t.includes(p))) {
        return { ok:false, msg:"🚫 Esse tema não é apropriado. Vamos falar de arte!" };
    }

    if (!temas.some(p => t.includes(p))) {
        return { ok:false, msg:"🎨 Vamos conversar sobre arte, combinado?" };
    }

    return { ok:true };
}

function ehPedidoDeImagem(texto) {
    return ["desenho","colorir","imagem"].some(p => texto.toLowerCase().includes(p));
}

function criarPromptColorir(input) {
    return `
Desenho infantil para colorir.
Linha preta grossa, sem cores, fundo branco.
Tema: ${input}.
`;
}

// ===== IMAGEM VIA BACKEND =====
async function gerarImagemColorir(promptUsuario) {

    const valid = validarPromptArte(promptUsuario);
    if (!valid.ok) return valid.msg;

    const prompt = criarPromptColorir(promptUsuario);

    try {
        const res = await fetch("/api/imagem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        const img = document.getElementById("imagemGerada");
        img.src = data.url;
        img.style.display = "block";

        return "Aqui está um belo desenho para você colorir! 🖍️";
    } catch {
        return "Hmm... não consegui gerar o desenho agora. Tente novamente em instantes.";
    }
}

// ===== RESPOSTA IA (PERSONALIDADE DO CANDINHO) =====
async function getResposta(pergunta) {

    if (!engine) return "Estou me preparando para nossa conversa sobre arte... 🎨";

    const reply = await engine.chat.completions.create({
        messages: [
            {
                role: "system",
                content: `Você é o Candinho, um professor de arte de 60 anos.
Fala português corretamente, com linguagem clara e educativa.
Ensina crianças de 10 anos.
É paciente, amigável e gosta de explicar arte de forma simples.
Possui conhecimento de arte, cultura geral, matemática básica e inglês.
Evita linguagem neutra.
Responda como um professor experiente e acolhedor.`
            },
            { role: "user", content: pergunta }
        ],
        max_tokens: 120
    });

    return reply.choices[0].message.content;
}

// ===== CHAT =====
window.enviarMensagem = async function() {

    const input = document.getElementById("pergunta");
    const chat = document.getElementById("chat");

    const pergunta = input.value.trim();
    if (!pergunta) return;

    chat.innerHTML += `<div class="msg user-msg">${pergunta}</div>`;
    input.value = "";

    let resposta;

    if (ehPedidoDeImagem(pergunta)) {
        const img = await gerarImagemColorir(pergunta);
        const texto = await getResposta(pergunta);
        resposta = img + "<br><br>" + texto;
    } else {
        resposta = await getResposta(pergunta);
    }

    chat.innerHTML += `
        <div class="msg ai-msg">
            <img src="https://i.imgur.com/fnMYS0Z.png" class="msg-avatar">
            <div><b>Candinho</b><br>${resposta}</div>
        </div>
    `;
}

// ✅ MODELO CORRIGIDO (SEM ERRO)
engine = await CreateMLCEngine("Llama-3-8B-Instruct-q4f32_1-MLC");

</script>

</body>
</html>
