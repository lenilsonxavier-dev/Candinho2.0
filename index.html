   function extrairMemoria(pergunta) {

// ======================= RESPOSTAS INSTANTÂNEAS - VERSÃO FINAL (PRIORIDADE TOTAL) =======================
function normalizar(texto) {
    return texto.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// Mapeamento de temas com palavras-chave abrangentes
function detectarTemaPrioritario(texto) {
    const txt = texto.toLowerCase();
    // Artes visuais (inclui cores, elementos, etc.)
    const artesVisuaisKeywords = [
        "cor primaria", "cores primarias", "cor primária", "cores primárias",
        "cor secundaria", "cores secundarias", "cor secundária", "cores secundárias",
        "cor terciaria", "cores terciarias", "cor terciária", "cores terciárias",
        "linha", "ponto", "forma", "textura", "volume", "perspectiva", "composicao",
        "luz e sombra", "elementos da arte", "elementos visuais", "o que e arte",
        "pintura", "desenho", "escultura", "arte visual", "cor quente", "cor fria"
    ];
    if (artesVisuaisKeywords.some(kw => txt.includes(kw))) return "arte";
    
    // Dança
    if (txt.includes("danca") || txt.includes("ballet") || txt.includes("samba") || 
        txt.includes("coreografia") || txt.includes("frevo") || txt.includes("maracatu") ||
        txt.includes("caboclinho") || txt.includes("ciranda") || txt.includes("carimbo")) return "danca";
    
    // Teatro
    if (txt.includes("teatro") || txt.includes("peca") || txt.includes("ator") || 
        txt.includes("fantoche") || txt.includes("sombras") || txt.includes("shakespeare") ||
        txt.includes("suassuna")) return "teatro";
    
    // Música
    if (txt.includes("musica") || txt.includes("cancao") || txt.includes("instrumento") ||
        txt.includes("ritmo") || txt.includes("violao") || txt.includes("samba") && !txt.includes("danca")) return "musica";
    
    // Folclore
    if (txt.includes("folclore") || txt.includes("lenda") || txt.includes("saci") || 
        txt.includes("curupira") || txt.includes("iara") || txt.includes("boitata")) return "folclore";
    
    // Festas
    if (txt.includes("festa") || txt.includes("carnaval") || txt.includes("junina") ||
        txt.includes("bumba meu boi") || txt.includes("cirio")) return "festas";
    
    // Cultura indígena
    if (txt.includes("indigena") || txt.includes("tupi") || txt.includes("grafismo") ||
        txt.includes("cestaria") || txt.includes("pintura corporal")) return "indigena";
    
    // Cultura afro-brasileira
    if (txt.includes("afro") || txt.includes("quilombo") || txt.includes("orixa")) return "afro";
    
    // Atividades artísticas
    if (txt.includes("atividade") || txt.includes("oficina") || txt.includes("desenho")) return "atividade";
    
    // Artistas (prioridade alta)
    if (txt.includes("artista") || txt.includes("van gogh") || txt.includes("pintor") ||
        txt.includes("tarsila") || txt.includes("portinari") || txt.includes("picasso") ||
        txt.includes("monet") || txt.includes("dali") || txt.includes("frida")) return "artista";
    
    // Piadas
    if (txt.includes("piada")) return "piada";
    
    // Curiosidades
    if (txt.includes("curiosidade")) return "curiosidade";
    
    // Emoção (apoio emocional)
    if (txt.includes("triste") || txt.includes("ansioso") || txt.includes("medo") || 
        txt.includes("raiva") || txt.includes("alegre")) return "emocao";
    
    return null;
}

// Busca recursiva: retorna a primeira explicação encontrada com base nas palavras-chave
function buscarRecursivo(obj, textoNorm) {
    if (!obj || typeof obj !== "object") return null;
    
    // Se o objeto tem palavras_chave e explicacao_infantil/resposta
    if (obj.palavras_chave && Array.isArray(obj.palavras_chave)) {
        for (let kw of obj.palavras_chave) {
            let kwNorm = normalizar(kw);
            if (textoNorm.includes(kwNorm)) {
                return obj.explicacao_infantil || obj.resposta || null;
            }
        }
    }
    
    // Percorre todas as propriedades recursivamente
    for (let key in obj) {
        if (obj.hasOwnProperty(key) && typeof obj[key] === "object") {
            let resultado = buscarRecursivo(obj[key], textoNorm);
            if (resultado) return resultado;
        }
    }
    return null;
}

// Busca em um JSON específico (dataStore[chave])
function buscarEmJSON(jsonObj, pergunta) {
    if (!jsonObj || typeof jsonObj !== "object") return null;
    const textoNorm = normalizar(pergunta);
    return buscarRecursivo(jsonObj, textoNorm);
}

// Resposta instantânea principal (prioridade máxima)
function respostaInstantanea(pergunta) {
    const tema = detectarTemaPrioritario(pergunta);
    const texto = normalizar(pergunta);
    
    // Caso especial: piada
    if (tema === "piada" && dataStore.piadas) {
        const piadasArray = Object.values(dataStore.piadas);
        if (piadasArray.length) {
            const aleatoria = piadasArray[Math.floor(Math.random() piadasArray.length)];
            return aleatoria.explicacao_infantil || aleatoria.resposta || "Kkkkkk";
        }
    }
    
    // Caso especial: curiosidade
    if (tema === "curiosidade" && dataStore.curiosidades) {
        const curiosArray = Object.values(dataStore.curiosidades);
        if (curiosArray.length) {
            const aleatoria = curiosArray[Math.floor(Math.random() * curiosArray.length)];
            return aleatoria.explicacao_infantil || aleatoria.resposta;
        }
    }
    
    // Caso especial: apoio emocional
    if (tema === "emocao" && dataStore.emocional) {
        for (let chave in dataStore.emocional) {
            const item = dataStore.emocional[chave];
            if (item.palavras_chave && item.palavras_chave.some(p => texto.includes(p))) {
                return item.resposta || item.explicacao_infantil;
            }
        }
    }
    
    // Mapeamento tema -> chaves do dataStore (ordem de prioridade)
    let chavesBusca = [];
    if (tema === "arte") chavesBusca = ["artes_visuais", "artes", "artistas", "artistas_universais", "historia_arte", "lugares_arte"];
    else if (tema === "danca") chavesBusca = ["dancas", "ritmos_musicais"];
    else if (tema === "musica") chavesBusca = ["musica", "ritmos_musicais"];
    else if (tema === "teatro") chavesBusca = ["teatro"];
    else if (tema === "folclore") chavesBusca = ["folclore"];
    else if (tema === "festas") chavesBusca = ["festas_brasileiras"];
    else if (tema === "indigena") chavesBusca = ["cultura_indigena"];
    else if (tema === "afro") chavesBusca = ["cultura_afro_brasileira"];
    else if (tema === "atividade") chavesBusca = ["atividades_artisticas"];
    else if (tema === "artista") chavesBusca = ["artistas", "artistas_universais"];
    else {
        // Sem tema: busca em todas as bases (exceto piadas para não bagunçar)
        chavesBusca = Object.keys(dataStore).filter(k => k !== "piadas" && k !== "curiosidades" && k !== "emocional");
    }
    
    // Busca na ordem definida
    for (let chave of chavesBusca) {
        const obj = dataStore[chave];
        if (obj) {
            const resposta = buscarEmJSON(obj, pergunta);
            if (resposta && typeof resposta === "string" && resposta.trim().length > 0) {
                return resposta;
            }
        }
    }
    
    // Fallback: perguntas "o que é" sem tema detectado
    if (texto.includes("o que e") || texto.includes("o que é")) {
        // Tenta achar alguma definição geral em conceitos
        for (let baseKey of ["musica", "dancas", "teatro", "folclore", "artes_visuais", "cultura_indigena", "cultura_afro_brasileira", "festas_brasileiras"]) {
            const obj = dataStore[baseKey];
            if (obj && obj.conceitos && typeof obj.conceitos === "object") {
                let conceitoItem = null;
                if (baseKey === "dancas" && obj.conceitos.o_que_e_danca) conceitoItem = obj.conceitos.o_que_e_danca;
                else if (obj.conceitos.o_que_e) conceitoItem = obj.conceitos.o_que_e;
                if (conceitoItem && conceitoItem.explicacao_infantil) {
                    return conceitoItem.explicacao_infantil;
                }
            }
        }
    }
    
    return null; // Sem resposta instantânea
}

// ======================= FUNÇÃO RESPONDER (PRIORIDADE INSTANTÂNEA) =======================
async function responder(pergunta) {
    // 1. Memória (nome, idade, interesses)
    const memoriaDetectada = extrairMemoria(pergunta);
    if (memoriaDetectada) {
        historicoMensagens.push({ role: "user", content: pergunta });
        historicoMensagens.push({ role: "assistant", content: memoriaDetectada });
        await salvarMensagemFirebase("user", pergunta);
        await salvarMensagemFirebase("assistant", memoriaDetectada);
        return memoriaDetectada;
    }
    
    // 2. Perguntas sobre memória armazenada
    if (pergunta.toLowerCase().includes("meu nome")) {
        return memoria.nome ? `Seu nome é ${memoria.nome}! 😊` : "Você ainda não me contou seu nome!";
    }
    if (pergunta.toLowerCase().includes("quantos anos eu tenho")) {
        return memoria.idade ? `Você tem ${memoria.idade} anos! 🎈` : "Você ainda não me contou sua idade!";
    }
    
    // 3. Resposta instantânea (JSONs) - PRIORIDADE MÁXIMA
    const instant = respostaInstantanea(pergunta);
    if (instant) {
        historicoMensagens.push({ role: "user", content: pergunta });
        historicoMensagens.push({ role: "assistant", content: instant });
        await salvarMensagemFirebase("user", pergunta);
        await salvarMensagemFirebase("assistant", instant);
        return instant;
    }
    
    // 4. Se não achou nada, chama a IA (proxy)
    memoria.historicoCurto.push({ role: "user", content: pergunta });
    if (memoria.historicoCurto.length > 6) memoria.historicoCurto.shift();
    
    try {
        const response = await fetch('/api/groq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensagem: pergunta, memoria: memoria })
        });
        const textResponse = await response.text();
        let data;
        try {
            data = JSON.parse(textResponse);
        } catch (jsonError) {
            console.error("Proxy retornou texto não-JSON:", textResponse.slice(0, 200));
            throw new Error("Resposta inválida do servidor");
        }
        if (!response.ok) throw new Error(data.error || `Erro HTTP ${response.status}`);
        const respostaIA = data.reply || "Não consegui responder. Tente de novo!";
        
        memoria.historicoCurto.push({ role: "assistant", content: respostaIA });
        historicoMensagens.push({ role: "user", content: pergunta });
        historicoMensagens.push({ role: "assistant", content: respostaIA });
        await salvarMensagemFirebase("user", pergunta);
        await salvarMensagemFirebase("assistant", respostaIA);
        return respostaIA;
        
    } catch (erro) {
        console.error("Erro no proxy:", erro);
        return "Desculpe, não consegui me conectar à minha central de conhecimentos agora. Tente novamente mais tarde. 🎨";
    }
}

    }
    
    // ======================= CARREGAR JSONs =======================
    async function carregarTodosJSONs() {
        statusDiv.innerText = "📥 Baixando respostas instantâneas...";
        const promises = [];
        for (const [key, filename] of Object.entries(jsonFiles)) {
            const url = GITHUB_BASE + filename;
            promises.push(
                fetch(url)
                    .then(res => res.ok ? res.json() : (console.warn(`Arquivo ${filename} não encontrado`), {}))
                    .catch(err => { console.warn(`Erro ${filename}:`, err); return {}; })
            );
        }
        const resultados = await Promise.all(promises);
        let idx = 0;
        for (const key of Object.keys(jsonFiles)) {
            dataStore[key] = resultados[idx++];
        }
        const carregados = Object.keys(dataStore).filter(k => Object.keys(dataStore[k]).length > 0);
        console.log("JSONs carregados:", carregados);
        statusDiv.innerText = carregados.length ? "🎨 Candinho pronto!" : "⚠️ Respostas instantâneas indisponíveis";
    }
    
    // ======================= INTERFACE =======================
    let isProcessing = false;
    async function enviar() {
        if (isProcessing) return;
        const texto = inputField.value.trim();
        if (!texto) return;
        isProcessing = true;
        sendBtn.disabled = true;
        inputField.disabled = true;
        addMessageToUI(texto, true);
        inputField.value = "";
        addLoading();
        try {
            const resposta = await responder(texto);
            removeLoading();
            addMessageToUI(resposta, false);
        } catch (err) {
            removeLoading();
            addMessageToUI("Ops! Ocorreu um erro inesperado. Recarregue a página e tente novamente.", false, true);
            console.error(err);
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            inputField.disabled = false;
            inputField.focus();
        }
    }
    sendBtn.addEventListener("click", enviar);
    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter" && !isProcessing) enviar(); });
    
    async function init() {
        await carregarTodosJSONs();
        await carregarHistoricoFirebase();
        if (historicoMensagens.length === 0) {
            let boasVindas = "Olá! Sou o Candinho, seu amigo artista. Pergunte sobre artistas, dança, história, ou peça uma piada! 🖌️";
            if (nomeUsuario) boasVindas = `Olá, ${nomeUsuario}! Sou o Candinho, seu amigo artista. Vamos criar? 🎨`;
            addMessageToUI(boasVindas, false);
            historicoMensagens.push({ role: "assistant", content: boasVindas });
            await salvarMensagemFirebase("assistant", boasVindas);
        }
    }
    init().catch(err => {
        console.error(err);
        statusDiv.innerText = "Erro crítico ao iniciar.";
        addMessageToUI("Não foi possível carregar os conhecimentos do Candinho. Verifique a conexão.", false, true);
    });
    
    window.enviar = enviar;
</script>
</body>
