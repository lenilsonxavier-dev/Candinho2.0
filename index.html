<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - IA de Arte</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white; 
    padding: 20px; 
    display: flex; 
    justify-content: center;
    min-height: 100vh;
}

.container { 
    width: 100%; 
    max-width: 800px; 
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px; 
    padding: 25px; 
}

.header { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 20px; 
    border-bottom: 2px solid #ffd700;
    padding-bottom: 15px;
}

.avatar { 
    width: 70px; 
    height: 70px; 
    border-radius: 50%; 
    object-fit: cover;
    border: 3px solid #ffd700;
    background: #533483;
}

.title h1 { 
    font-size: 1.8em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

#chat { 
    height: 400px; 
    overflow-y: auto; 
    background: rgba(15, 52, 96, 0.4);
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 15px;
}

.input-area { 
    display: flex; 
    gap: 10px; 
}

input { 
    flex: 1; 
    padding: 14px; 
    border-radius: 30px; 
    border: none; 
    background: #0f3460;
    color: white;
    outline: none;
}

button { 
    padding: 14px 25px; 
    border-radius: 30px; 
    background: #e94560; 
    color: white; 
    border: none; 
    cursor: pointer; 
    transition: transform 0.2s;
}

button:hover:not(:disabled) {
    transform: scale(1.05);
}

button:disabled {
    background: #666;
    cursor: not-allowed;
}

.msg { 
    margin-bottom: 15px; 
    padding: 12px; 
    border-radius: 15px; 
}

.user-msg { 
    background: #1b6ca8; 
    margin-left: 40px;
}

.ai-msg { 
    background: #533483; 
}

.typing {
    display: inline-block;
}

.typing span {
    animation: blink 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

#imagemGerada {
    max-width: 100%;
    max-height: 300px;
    border-radius: 10px;
    display: none;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.arte-container {
    text-align: center;
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/fnMYS0Z.png" class="avatar" alt="Candinho" onerror="this.src='https://via.placeholder.com/70/533483/ffd700?text=C'">
    <div class="title">
        <h1>Candinho 2.0 🎨</h1>
        <small>Gerador de Arte com IA</small>
    </div>
</div>

<div id="chat">
    <div class="msg ai-msg">
        <div>
        <b>Candinho</b><br>
        Sou o Candinho 2.0! Agora com superpoderes de desenho! 🎨✨<br>
        Peça: <strong>"Desenhe um gato fofo"</strong> ou pergunte sobre arte!<br>
        <small>💡 Dica: use palavras como "desenhe", "crie", "faça uma arte de"</small>
        </div>
    </div>
</div>

<div class="arte-container" id="areaImagem">
    <img id="imagemGerada">
</div>

<div class="input-area">
    <input id="pergunta" placeholder="Ex: Desenhe um dinossauro robô..." />
    <button onclick="enviarMensagem()" id="sendBtn">Enviar</button>
</div>

</div>

<script>
function ehPedidoDeImagem(texto) {
    const palavras = ["desenhe", "desenha", "crie", "faça", "gera", "imagem", "pintar", "ilustre", "desenho", "arte de", "criar"];
    return palavras.some(p => texto.toLowerCase().includes(p));
}

function addMessage(text, isUser = false) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
    const nome = isUser ? 'Você' : 'Candinho';
    div.innerHTML = `<div><b>${nome}</b><br>${text}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.enviarMensagem = async function() {
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    const pergunta = input.value.trim();
    if (!pergunta) return;
    
    input.disabled = true;
    sendBtn.disabled = true;
    
    addMessage(pergunta, true);
    input.value = "";
    
    document.getElementById("imagemGerada").style.display = "none";
    
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg ai-msg";
    typingDiv.innerHTML = `<div><b>Candinho</b><br><span class="typing">🎨 Criando arte<span>.</span><span>.</span><span>.</span></span></div>`;
    document.getElementById("chat").appendChild(typingDiv);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    
    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: pergunta,
                gerarImagem: ehPedidoDeImagem(pergunta)
            })
        });
        
        const data = await response.json();
        
        typingDiv.remove();
        
        if (data.imagem) {
            const img = document.getElementById("imagemGerada");
            img.src = data.imagem;
            img.style.display = "block";
            addMessage("✨ Aqui está sua arte! ✨", false);
        }
        
        if (data.resposta) {
            addMessage(data.resposta, false);
        }
        
    } catch (error) {
        typingDiv.remove();
        addMessage("😅 Ops! Não consegui gerar a arte agora. Tente novamente em alguns segundos! 🎨", false);
        console.error("Erro:", error);
    }
    
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
}

document.getElementById("pergunta").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        enviarMensagem();
    }
});
</script>

</body>
</html>
