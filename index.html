<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - Seu Amigo Artista</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #2b1b3a 0%, #1a2a3a 100%);
    color: white;
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 850px;
    background: rgba(0, 0, 0, 0.65);
    border-radius: 30px;
    padding: 25px;
    backdrop-filter: blur(8px);
    position: relative;
}

.avatar {
    display: block;
    margin: 0 auto 15px;
    width: 85px;
    height: 85px;
    border-radius: 50%;
    border: 3px solid #f9b713;
    object-fit: cover;
}
h1 {
    text-align: center;
    font-size: 2.2rem;
    background: linear-gradient(135deg, #f9b713, #f28500);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 5px;
}
.sub {
    text-align: center;
    color: #ddd;
    margin-bottom: 20px;
    font-style: italic;
}
#chat {
    height: 450px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}
.msg {
    margin-bottom: 12px;
    padding: 10px 15px;
    border-radius: 20px;
    max-width: 85%;
    word-wrap: break-word;
}
.user-msg {
    background: #1e6f5c;
    margin-left: auto;
    border-bottom-right-radius: 5px;
}
.ai-msg {
    background: #4a2e6b;
    margin-right: auto;
    border-bottom-left-radius: 5px;
}
.input-area {
    display: flex;
    gap: 10px;
}
input {
    flex: 1;
    padding: 12px 18px;
    border-radius: 40px;
    border: none;
    background: #1f2a3e;
    color: white;
    font-size: 1rem;
    outline: none;
}
button {
    padding: 12px 24px;
    border-radius: 40px;
    background: #e67e22;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
button:disabled {
    background: #7f8c8d;
    cursor: not-allowed;
}
.status {
    font-size: 0.8rem;
    background: #00000055;
    padding: 6px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    text-align: center;
}
#loginBox {
    background: rgba(0, 0, 0, 0.85);
    border-radius: 30px;
    padding: 30px;
    text-align: center;
    max-width: 350px;
    margin: 100px auto;
}
#loginBox input {
    width: 100%;
    margin-bottom: 15px;
}
#loginBox button {
    width: 100%;
}
.logout-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #e94560;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 0.8rem;
    color: white;
    cursor: pointer;
    border: none;
}
.logout-btn:hover {
    background: #ff6b8a;
}
</style>
</head>
<body>

<div id="app"></div>

<script type="importmap">
{
    "imports": {
        "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm@0.2.56"
    }
}
</script>

<script type="module">
import { CreateMLCEngine } from "@mlc-ai/web-llm";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// ================= CONFIGURAÇÃO DO FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSy...", // COLOQUE SUA CHAVE REAL
  authDomain: "candinho-8bee5.firebaseapp.com",
  projectId: "candinho-8bee5"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

// ================= IDENTIDADE DO USUÁRIO =================
let user_id = localStorage.getItem("candinho_user");
const appDiv = document.getElementById("app");

// Função de logout
function logout() {
    localStorage.removeItem("candinho_user");
    location.reload();
}

// Tela de login
function showLoginScreen() {
    appDiv.innerHTML = `
        <div id="loginBox">
            <img src="https://i.imgur.com/fnMYS0Z.png" style="width:80px; border-radius:50%; margin-bottom:20px;">
            <h2 style="color:#f9b713;">Olá! Qual é o seu nome?</h2>
            <input type="text" id="nomeUsuario" placeholder="Digite seu nome" autocomplete="off">
            <button id="entrarBtn">Entrar</button>
        </div>
    `;
    document.getElementById("entrarBtn").addEventListener("click", () => {
        const nome = document.getElementById("nomeUsuario").value.trim();
        if (!nome) return;
        localStorage.setItem("candinho_user", nome);
        location.reload();
    });
    document.getElementById("nomeUsuario").addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.getElementById("entrarBtn").click();
    });
}

if (!user_id) {
    showLoginScreen();
} else {
    // Carrega o chat principal com botão de sair
    appDiv.innerHTML = `
        <div class="container">
            <button class="logout-btn" id="logoutBtn">🚪 Sair / trocar usuário</button>
            <img src="https://i.imgur.com/fnMYS0Z.png" class="avatar" alt="Candinho">
            <h1>Candinho</h1>
            <div class="sub">Seu amigo artista!</div>
            <div id="status" class="status">🔌 Inicializando...</div>
            <div id="chat">
                <div class="msg ai-msg">🎨 Sou o Candinho. Seu amigo artista! Pergunte sobre arte, desenhos, ou sobre o que quiser. Vamos conversar!</div>
            </div>
            <div class="input-area">
                <input type="text" id="pergunta" placeholder="Pergunte sobre arte..." disabled>
                <button id="btnEnviar" disabled>Enviar</button>
            </div>
        </div>
    `;

    document.getElementById("logoutBtn").addEventListener("click", logout);

    // ================= VARIÁVEIS GLOBAIS =================
    let engine = null;
    let isCloudAvailable = true;
    let memoria = [];

    const chatDiv = document.getElementById("chat");
    const inputEl = document.getElementById("pergunta");
    const btn = document.getElementById("btnEnviar");
    const statusDiv = document.getElementById("status");

    // ================= FILTROS =================
    const palavrasProibidas = [
        "merda", "caralho", "puta", "bosta", "foda", "vadia", "vagabunda",
        "sexo", "pornô", "pornografia", "violência", "sangue", "morte", "ódio", "racismo", "homofobia",
        "todes", "amigue"
    ];
    function contemImproprio(texto) {
        return palavrasProibidas.some(p => texto.toLowerCase().includes(p));
    }
    function mensagemRepudio() {
        return "😊 Vamos conversar com respeito, combinado? Que tal falarmos sobre arte ou desenhos?";
    }

    // ================= PERSONALIDADE (com homenagem a Portinari) =================
  const systemPrompt = `Você é o Candinho, um artista e educcador experiente. 
  Seu nome é uma homenagem ao grande pintor brasileiro Cândido Portinari, que retratou o povo e a cultura do Brasil.
Você ama arte, desenhos, pintura, cultura brasileira e também sabe de matemática, português e inglês.
Você conversa com crianças de forma natural, leve, alegre e respeitosa, tratando a pessoa sempre por "você".
Nunca use diminutivos como "amiguinho", "fofinho" ou similares.
Nunca use expressões repetitivas como "meu amigo", "minha amiga", "que legal", "claro", "vamos lá" no início de toda resposta.
IMPORTANTE:
Varie sempre o começo das respostas.
Às vezes comece com uma pergunta.
Às vezes com uma observação curiosa.
Às vezes com entusiasmo direto.
Às vezes com humor leve.
Às vezes com uma frase curta e criativa.
Evite repetir estruturas e palavras de abertura.

Exemplo de inícios variados:
"Essa ideia ficou incrível 🎨"
"Você já percebeu como..."
"Gostei desse desafio!"
"Olha que interessante..."
"Isso me lembrou uma pintura famosa..."
"Boa pergunta!"
"Vamos descobrir isso juntos?"
"Tem um jeito divertido de entender isso"

Se perguntarem quem é você ou o significado do seu nome, explique que é uma homenagem a Cândido Portinari, um dos maiores artistas do Brasil.
Repudie palavras ofensivas ou assuntos impróprios com firmeza e gentileza, redirecionando para arte, aprendizado e criatividade.
Fale de forma espontânea, como um professor inspirador e humano, não como um robô.
Evite respostas mecânicas.
Evite repetir a mesma saudação.
Evite sempre usar emojis iguais.
Seu objetivo é fazer a criança sentir que está conversando com alguém criativo, acolhedor e inteligente.`;


    // ================= FIREBASE (MEMÓRIA PERSISTENTE) =================
    async function carregarMemoria() {
        try {
            const q = query(collection(db, "memorias"), orderBy("created_at"));
            const snap = await getDocs(q);
            memoria = [];
            snap.forEach(doc => {
                const d = doc.data();
                if (d.user_id === user_id) {
                    memoria.push({ role: d.role, content: d.content });
                }
            });
            statusDiv.innerHTML = `💾 Memória carregada (${memoria.length} mensagens) | IA: ${engine ? "pronta" : "carregando..."}`;
        } catch(e) {
            console.warn(e);
            statusDiv.innerHTML = "⚠️ Memória off-line";
        }
    }

    async function salvarMemoria(role, content) {
        try {
            await addDoc(collection(db, "memorias"), { user_id, role, content, created_at: Date.now() });
        } catch(e) {}
    }

    // ================= IA LOCAL =================
    async function initLocal() {
        try {
            statusDiv.innerHTML = "🖌️ Preparando inteligência (só na primeira vez)...";
            engine = await CreateMLCEngine("TinyLlama-1.1B-Chat-v0.4-q4f16_1-MLC", {
                initProgressCallback: (p) => {
                    statusDiv.innerHTML = `🧠 ${p.text} (${Math.round(p.progress*100)}%)`;
                }
            });
            statusDiv.innerHTML = "✅ Candinho pronto!";
            return true;
        } catch(e) {
            console.error(e);
            statusDiv.innerHTML = "⚠️ IA local indisponível. Usando apenas nuvem.";
            return false;
        }
    }

    // ================= API GROQ =================
    async function respostaCloud(pergunta) {
        if (!isCloudAvailable) return null;
        try {
            const res = await fetch("/api/groq", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: systemPrompt },
                        ...memoria.slice(-10),
                        { role: "user", content: pergunta }
                    ]
                })
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            return data.choices[0].message.content;
        } catch {
            isCloudAvailable = false;
            return null;
        }
    }

    async function respostaLocal(pergunta) {
        if (!engine) return null;
        try {
            const resp = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: systemPrompt },
                    ...memoria.slice(-10),
                    { role: "user", content: pergunta }
                ],
                max_tokens: 250,
                temperature: 0.8
            });
            return resp.choices[0].message.content;
        } catch(e) {
            console.warn(e);
            return null;
        }
    }

    async function getResposta(pergunta) {
        if (contemImproprio(pergunta)) return mensagemRepudio();
        let resposta = await respostaCloud(pergunta);
        if (!resposta) resposta = await respostaLocal(pergunta);
        if (!resposta) resposta = "😅 Não consegui entender. Pode repetir de outra forma?";
        return resposta;
    }

    // ================= INTERFACE =================
    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function addMessage(text, isUser = false) {
        const div = document.createElement("div");
        div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = `<b>${isUser ? user_id : 'Candinho'}</b><br>${escapeHtml(text)}`;
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function enviarMensagem() {
        const texto = inputEl.value.trim();
        if (!texto) return;

        addMessage(texto, true);
        inputEl.value = "";
        inputEl.disabled = true;
        btn.disabled = true;

        const typingDiv = document.createElement("div");
        typingDiv.className = "msg ai-msg";
        typingDiv.innerHTML = "<b>Candinho</b><br>✍️ pensando...";
        chatDiv.appendChild(typingDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;

        await salvarMemoria("user", texto);
        memoria.push({ role: "user", content: texto });

        const resposta = await getResposta(texto);

        typingDiv.remove();
        addMessage(resposta, false);

        await salvarMemoria("assistant", resposta);
        memoria.push({ role: "assistant", content: resposta });

        inputEl.disabled = false;
        btn.disabled = false;
        inputEl.focus();
    }

    // ================= INICIALIZAÇÃO =================
    async function init() {
        await carregarMemoria();
        await initLocal();
        try {
            const test = await fetch("/api/groq", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: [{ role: "user", content: "oi" }] }) });
            isCloudAvailable = test.ok;
        } catch { isCloudAvailable = false; }
        statusDiv.innerHTML = `✅ Candinho disponível (Olá, ${user_id}) | ${isCloudAvailable ? "Cloud ativa" : "Modo local"}`;
        inputEl.disabled = false;
        btn.disabled = false;
        inputEl.focus();
    }

    // Eventos
    window.enviarMensagem = enviarMensagem;
    btn.addEventListener("click", enviarMensagem);
    inputEl.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !inputEl.disabled) enviarMensagem();
    });

    init();
}
</script>
</body>
</html>
