<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - IA de Arte</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white; 
    padding: 20px; 
    display: flex; 
    justify-content: center;
    min-height: 100vh;
}

.container { 
    width: 100%; 
    max-width: 800px; 
    background: rgba(22, 33, 62, 0.95);
    border-radius: 20px; 
    padding: 25px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.header { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 20px; 
    padding-bottom: 15px;
    border-bottom: 2px solid #ffd700;
}

.avatar { 
    width: 70px; 
    height: 70px; 
    border-radius: 50%; 
    object-fit: cover;
    border: 3px solid #ffd700;
    background: #533483;
}

.title h1 { 
    font-size: 1.8em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.title small {
    opacity: 0.8;
    font-size: 0.85em;
}

#chat { 
    height: 400px; 
    overflow-y: auto; 
    background: rgba(15, 52, 96, 0.4);
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 15px;
    scroll-behavior: smooth;
}

.input-area { 
    display: flex; 
    gap: 10px; 
    margin-top: 10px;
}

input { 
    flex: 1; 
    padding: 14px 20px; 
    border-radius: 30px; 
    border: none; 
    background: #0f3460;
    color: white;
    font-size: 16px;
}

input:focus {
    outline: none;
    background: #1a4580;
    box-shadow: 0 0 0 2px #ffd700;
}

input::placeholder {
    color: #88aacc;
}

button { 
    padding: 14px 30px; 
    border-radius: 30px; 
    background: linear-gradient(135deg, #e94560, #c73e56);
    color: white; 
    border: none; 
    cursor: pointer; 
    font-weight: bold;
    transition: all 0.3s;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
}

button:disabled {
    background: #666;
    cursor: not-allowed;
}

.msg { 
    margin-bottom: 15px; 
    padding: 12px 15px; 
    border-radius: 15px; 
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.user-msg { 
    background: linear-gradient(135deg, #1b6ca8, #155a8c);
    margin-left: 40px;
    border-bottom-right-radius: 5px;
}

.ai-msg { 
    background: linear-gradient(135deg, #533483, #3d2668);
    margin-right: 40px;
    border-bottom-left-radius: 5px;
}

.status {
    background: #0f3460;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-align: center;
    font-size: 0.9em;
}

.status.success {
    background: linear-gradient(135deg, #2d6a4f, #1b4d3a);
}

.typing {
    display: inline-block;
}

.typing span {
    animation: blink 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

#imagemGerada {
    max-width: 100%;
    max-height: 300px;
    border-radius: 10px;
    display: none;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/fnMYS0Z.png" class="avatar" alt="Candinho" onerror="this.src='https://via.placeholder.com/70/533483/ffd700?text=C'">
    <div class="title">
        <h1>Candinho 🎨</h1>
        <small>Especialista em Arte</small>
    </div>
</div>

<div id="status" class="status success">✅ Candinho está pronto!</div>

<div id="chat">
    <div class="msg ai-msg">
        <div>
        <b>Candinho</b><br>
        Sou o Candinho. Seu amigo especialista em Arte. 🎨
        </div>
    </div>
</div>

<div id="areaImagem">
    <img id="imagemGerada" alt="Desenho gerado">
</div>

<div class="input-area">
    <input id="pergunta" placeholder="Pergunte sobre arte ou peça um desenho..." />
    <button onclick="enviarMensagem()" id="sendBtn">📤 Enviar</button>
</div>

</div>

<script>
function ehPedidoDeImagem(texto) {
    const palavras = ["desenho", "colorir", "desenha", "desenhe", "imagem", "ilustração", "pintar", "faça", "crie"];
    return palavras.some(p => texto.toLowerCase().includes(p));
}

function addMessage(text, isUser = false) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
    const nome = isUser ? 'Você' : 'Candinho';
    div.innerHTML = `<div><b>${nome}</b><br>${text}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.enviarMensagem = async function() {
    const input = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    
    const pergunta = input.value.trim();
    if (!pergunta) return;
    
    input.disabled = true;
    sendBtn.disabled = true;
    
    addMessage(pergunta, true);
    input.value = "";
    
    const img = document.getElementById("imagemGerada");
    img.style.display = "none";
    
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg ai-msg";
    typingDiv.innerHTML = `<div><b>Candinho</b><br><span class="typing">✍️<span>.</span><span>.</span><span>.</span></span></div>`;
    document.getElementById("chat").appendChild(typingDiv);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    
    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: pergunta,
                gerarImagem: ehPedidoDeImagem(pergunta)
            })
        });
        
        const data = await response.json();
        
        typingDiv.remove();
        
        if (data.imagem) {
            const img = document.getElementById("imagemGerada");
            img.src = data.imagem;
            img.style.display = "block";
        }
        
        addMessage(data.resposta, false);
        
    } catch (error) {
        typingDiv.remove();
        addMessage("Ops! Tente novamente. 🎨", false);
    }
    
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
}

document.getElementById("pergunta").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        enviarMensagem();
    }
});
</script>

</body>
</html>
