<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Candinho</title>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #ffeaa7, #81ecec);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 800px;
        width: 100%;
        background: white;
        border-radius: 35px;
        box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    .header {
        background: #6c5ce7;
        color: white;
        padding: 20px;
        text-align: center;
    }
    .avatar {
        width: 80px;
        border-radius: 50%;
        border: 3px solid #f9b713;
        margin-bottom: 10px;
    }
    .header h2 {
        margin: 0;
        font-size: 1.6rem;
    }
    #status {
        font-size: 0.8rem;
        margin-top: 5px;
        opacity: 0.9;
    }
    #chat {
        height: 400px;
        overflow-y: auto;
        background: #f8f9fa;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .msg {
        max-width: 80%;
        padding: 10px 15px;
        border-radius: 20px;
        line-height: 1.4;
        word-wrap: break-word;
        animation: fadeIn 0.2s ease;
    }
    .user {
        background: #74b9ff;
        align-self: flex-end;
        color: #000;
        border-bottom-right-radius: 5px;
    }
    .bot {
        background: #55efc4;
        align-self: flex-start;
        border-bottom-left-radius: 5px;
    }
    .error {
        background: #ffcccc;
        align-self: flex-start;
        border-left: 4px solid #ff0000;
    }
    .loading {
        background: #dfe6e9;
        font-style: italic;
        animation: pulse 1s infinite;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
    .input-area {
        display: flex;
        padding: 15px;
        background: white;
        border-top: 1px solid #ddd;
        gap: 10px;
    }
    input {
        flex: 1;
        padding: 12px 18px;
        border: 2px solid #6c5ce7;
        border-radius: 50px;
        font-size: 1rem;
        outline: none;
    }
    button {
        background: #fd79a8;
        border: none;
        padding: 0 20px;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
   
   
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://i.imgur.com/fnMYS0Z.png" alt="Candinho" class="avatar">
        <h2>Candinho 🎨</h2>
        <div id="status">🔄 Carregando conhecimentos...</div>
    </div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="pergunta" placeholder="Pergunte sobre arte, dança, história ou peça uma piada..." autocomplete="off">
        <button id="sendBtn">Enviar</button>
    </div>
</div>

<script type="module">
    // ======================= CONFIGURAÇÕES =======================
    const GITHUB_BASE = "https://raw.githubusercontent.com/lenilsonxavier-dev/Candinho2.0/main/data/";
    const jsonFiles = {
        dancas: "dancas.json",
        artes: "artes_visuais.json",
        artistas: "artistas.json",
        historia: "historia_arte.json",
        teatro: "teatro.json",
        musica: "musica.json",
        folclore: "folclore.json",
        ritmos: "ritmos_musicais.json",
        festas: "festas_brasileiras.json",
        lugares: "lugares_arte.json",
        curiosidades: "curiosidades.json",
        indigena: "cultura_indigena.json",
        afro: "cultura_afro_brasileira.json",
        atividades: "atividades_artisticas.json",
        emocional: "apoio_emocional.json",
        piadas: "piadas.json"
    };
    
    let dataStore = {};
    let historicoMensagens = [];
    let nomeUsuario = localStorage.getItem("candinho_nome") || "";
    let conversaId = localStorage.getItem("candinho_conversaId");
    if (!conversaId) {
        conversaId = `sessao_${Date.now()}`;
        localStorage.setItem("candinho_conversaId", conversaId);
    }
    let memoria = {
        nome: localStorage.getItem("candinho_nome") || "",
        idade: localStorage.getItem("candinho_idade") || "",
        interesses: JSON.parse(localStorage.getItem("candinho_interesses") || "[]"),
        nivel: localStorage.getItem("candinho_nivel") || "iniciante",
        historicoCurto: []
    };
    
    const chatDiv = document.getElementById("chat");
    const inputField = document.getElementById("pergunta");
    const sendBtn = document.getElementById("sendBtn");
    const statusDiv = document.getElementById("status");
    
    // ======================= FUNÇÕES AUXILIARES =======================
    function addMessageToUI(text, isUser, isError = false) {
        const div = document.createElement("div");
        div.className = `msg ${isUser ? "user" : "bot"} ${isError ? "error" : ""}`;
        div.innerText = text;
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        return div;
    }
    function extrairMemoria(pergunta) {
        const texto = pergunta.toLowerCase();
        const nomeMatch = pergunta.match(/(?:meu nome é|sou|chamo|chamo-me) (\w+)/i);
        if (nomeMatch) {
            memoria.nome = nomeMatch[1];
            localStorage.setItem("candinho_nome", memoria.nome);
            return `Prazer, ${memoria.nome}! Vou lembrar de você 😊`;
        }
        const idadeMatch = pergunta.match(/(\d{1,2}) anos/);
        if (idadeMatch) {
            memoria.idade = idadeMatch[1];
            localStorage.setItem("candinho_idade", memoria.idade);
            return `Legal! Você tem ${memoria.idade} anos 🎈`;
        }
        const interesses = ["desenhar", "pintar", "dançar", "música", "teatro"];
        for (let interesse of interesses) {
            if (texto.includes(interesse)) {
                if (!memoria.interesses.includes(interesse)) {
                    memoria.interesses.push(interesse);
                    localStorage.setItem("candinho_interesses", JSON.stringify(memoria.interesses));
                    return `Que legal que você gosta de ${interesse}! 🎨`;
                }
            }
        }
        return null;
    }
    function addLoading() {
        const div = document.createElement("div");
        div.className = "msg bot loading";
        div.id = "loadingMsg";
        div.innerText = "Candinho está pensando... 🖌️";
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    function removeLoading() {
        const el = document.getElementById("loadingMsg");
        if (el) el.remove();
    }
    
    // ======================= FIREBASE =======================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    const firebaseConfig = {
        apiKey: "AIzaSyCQq1DYHivZBIX2_0_NY7eKIoBWG5sKs48",
        authDomain: "candinho-8bee5.firebaseapp.com",
        projectId: "candinho-8bee5",
        storageBucket: "candinho-8bee5.firebasestorage.app",
        messagingSenderId: "342319000222",
        appId: "1:342319000222:web:ab04b940b0175b8722a98f"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const CONVERSA_COLLECTION = "conversas_candinho";
    
    async function salvarMensagemFirebase(role, content) {
        try {
            await addDoc(collection(db, CONVERSA_COLLECTION), {
                conversaId: conversaId,
                role: role,
                content: content,
                timestamp: new Date()
            });
        } catch (e) { console.warn("Erro Firebase:", e); }
    }
    async function carregarHistoricoFirebase() {
        try {
            const q = query(collection(db, CONVERSA_COLLECTION), where("conversaId", "==", conversaId), orderBy("timestamp", "desc"), limit(12));
            const snap = await getDocs(q);
            const msgs = [];
            snap.forEach(doc => msgs.push(doc.data()));
            msgs.reverse();
            historicoMensagens = msgs.map(m => ({ role: m.role, content: m.content }));
            for (let msg of historicoMensagens) {
                addMessageToUI(msg.content, msg.role === "user");
            }
            statusDiv.innerText = "✅ Candinho pronto";
        } catch (e) {
            console.warn("Erro ao carregar histórico:", e);
            historicoMensagens = [];
            statusDiv.innerText = "⚠️ Memória local apenas (Firebase indisponível)";
        }
    }
    
    // ======================= RESPOSTAS INSTANTÂNEAS CORRIGIDAS =======================
    // ======================= RESPOSTAS INSTANTÂNEAS CORRIGIDAS =======================
function normalizar(texto) {
    return texto.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// Tema prioritário (igual ao anterior)
const temaParaChave = {
    danca: ["dancas", "ritmos"],
    musica: ["musica", "ritmos"],
    teatro: ["teatro"],
    folclore: ["folclore"],
    festas: ["festas"],
    indigena: ["indigena"],
    afro: ["afro"],
    arte: ["artes", "artistas", "historia", "lugares"],
    curiosidade: ["curiosidades"],
    piada: ["piadas"],
    emocao: ["emocional"],
    atividade: ["atividades"]
};

function detectarTemaPrioritario(texto) {
    const txt = texto.toLowerCase();
    if (txt.includes("piada")) return "piada";
    if (txt.includes("curiosidade")) return "curiosidade";
    if (txt.includes("emocao") || txt.includes("sentimento") || txt.includes("triste") || txt.includes("alegre")) return "emocao";
    if (txt.includes("danca") || txt.includes("ballet") || txt.includes("samba") || txt.includes("coreografia")) return "danca";
    if (txt.includes("musica") || txt.includes("cancao") || txt.includes("instrumento")) return "musica";
    if (txt.includes("teatro") || txt.includes("peca") || txt.includes("ator")) return "teatro";
    if (txt.includes("folclore") || txt.includes("lenda") || txt.includes("saci")) return "folclore";
    if (txt.includes("festa") || txt.includes("carnaval") || txt.includes("junina")) return "festas";
    if (txt.includes("indigena") || txt.includes("tupi") || txt.includes("guarani")) return "indigena";
    if (txt.includes("afro") || txt.includes("quilombo")) return "afro";
    if (txt.includes("atividade") || txt.includes("oficina")) return "atividade";
    if (txt.includes("pintor") || txt.includes("van gogh") || txt.includes("artista")) return "arte";
    if (txt.includes("arte") && !txt.includes("danca") && !txt.includes("musica")) return "arte";
    return null;
}

// Busca recursiva em qualquer objeto JSON, retorna o texto amigável (string)
function buscarRecursivo(obj, textoNorm, melhorAtual = { score: 0, resposta: null }) {
    if (!obj || typeof obj !== "object") return melhorAtual;
    
    // Se este objeto tem palavras_chave e explicacao_infantil/resposta
    if (obj.palavras_chave && Array.isArray(obj.palavras_chave)) {
        for (let kw of obj.palavras_chave) {
            let kwNorm = normalizar(kw);
            if (textoNorm.includes(kwNorm) && kwNorm.length > 2) {
                let score = kwNorm.length;
                if (score > melhorAtual.score) {
                    melhorAtual.score = score;
                    melhorAtual.resposta = obj.explicacao_infantil || obj.resposta || null;
                }
            }
        }
    }
    
    // Se tem explicacao_infantil ou resposta e não encontramos ainda nada, guarda como fallback
    if (!melhorAtual.resposta && (obj.explicacao_infantil || obj.resposta)) {
        melhorAtual.resposta = obj.explicacao_infantil || obj.resposta;
        melhorAtual.score = 1; // score baixo, mas serve como fallback
    }
    
    // Percorre todas as chaves recursivamente
    for (let key in obj) {
        if (obj.hasOwnProperty(key) && typeof obj[key] === "object") {
            melhorAtual = buscarRecursivo(obj[key], textoNorm, melhorAtual);
        }
    }
    return melhorAtual;
}

// Busca em um JSON específico (pode ser qualquer objeto aninhado)
function buscarEmJSON(obj, texto) {
    if (!obj || typeof obj !== "object") return null;
    const textoNorm = normalizar(texto);
    const resultado = buscarRecursivo(obj, textoNorm, { score: 0, resposta: null });
    return resultado.resposta; // será string ou null
}

function respostaInstantanea(pergunta) {
    const texto = normalizar(pergunta);
    const tema = detectarTemaPrioritario(pergunta);
    
    // Piada
    if (tema === "piada" && dataStore.piadas) {
        const piadasArray = Object.values(dataStore.piadas);
        if (piadasArray.length) {
            const aleatoria = piadasArray[Math.floor(Math.random() * piadasArray.length)];
            return aleatoria.explicacao_infantil || aleatoria.resposta || "Kkkkkk";
        }
    }
    // Curiosidade
    if (tema === "curiosidade" && dataStore.curiosidades) {
        const curiosArray = Object.values(dataStore.curiosidades);
        if (curiosArray.length) {
            const aleatoria = curiosArray[Math.floor(Math.random() * curiosArray.length)];
            return aleatoria.explicacao_infantil || aleatoria.resposta;
        }
    }
    // Emoção
    if (tema === "emocao" && dataStore.emocional) {
        for (let chave in dataStore.emocional) {
            const item = dataStore.emocional[chave];
            if (item.palavras_chave && item.palavras_chave.some(p => texto.includes(p))) {
                return item.resposta || item.explicacao_infantil;
            }
        }
    }
    
    // Busca por tema específico ou geral
    if (tema && temaParaChave[tema]) {
        const chaves = temaParaChave[tema];
        for (let chave of chaves) {
            const obj = dataStore[chave];
            if (obj) {
                const resposta = buscarEmJSON(obj, pergunta);
                if (resposta && typeof resposta === "string" && resposta.length > 0) return resposta;
            }
        }
    } else {
        // Sem tema: busca em todas as bases
        for (let baseKey in dataStore) {
            const obj = dataStore[baseKey];
            if (obj) {
                const resposta = buscarEmJSON(obj, pergunta);
                if (resposta && typeof resposta === "string" && resposta.length > 0) return resposta;
            }
        }
    }
    
    // Conceitos (ex: "o que é música")
    if (texto.includes("o que e") || texto.includes("o que é")) {
        for (let baseKey of ["musica", "dancas", "teatro", "folclore", "artes", "indigena", "afro", "festas"]) {
            const obj = dataStore[baseKey];
            if (obj && obj.conceitos && typeof obj.conceitos === "object") {
                let conceitoItem = null;
                if (baseKey === "dancas" && obj.conceitos.o_que_e_danca) conceitoItem = obj.conceitos.o_que_e_danca;
                else if (obj.conceitos.o_que_e) conceitoItem = obj.conceitos.o_que_e;
                if (conceitoItem && conceitoItem.explicacao_infantil) {
                    return conceitoItem.explicacao_infantil;
                }
            }
        }
    }
    
    return null;
}
    
    // ======================= IA (PROXY) =======================
    async function responder(pergunta) {
        const memoriaDetectada = extrairMemoria(pergunta);
        if (memoriaDetectada) {
            historicoMensagens.push({ role: "user", content: pergunta });
            historicoMensagens.push({ role: "assistant", content: memoriaDetectada });
            await salvarMensagemFirebase("user", pergunta);
            await salvarMensagemFirebase("assistant", memoriaDetectada);
            return memoriaDetectada;
        }
        if (pergunta.toLowerCase().includes("meu nome")) {
            return memoria.nome ? `Seu nome é ${memoria.nome}! 😊` : "Você ainda não me contou seu nome!";
        }
        if (pergunta.toLowerCase().includes("quantos anos eu tenho")) {
            return memoria.idade ? `Você tem ${memoria.idade} anos! 🎈` : "Você ainda não me contou sua idade!";
        }
        
        const instant = respostaInstantanea(pergunta);
        if (instant) {
            historicoMensagens.push({ role: "user", content: pergunta });
            historicoMensagens.push({ role: "assistant", content: instant });
            await salvarMensagemFirebase("user", pergunta);
            await salvarMensagemFirebase("assistant", instant);
            return instant;
        }
        
        memoria.historicoCurto.push({ role: "user", content: pergunta });
        if (memoria.historicoCurto.length > 6) memoria.historicoCurto.shift();
        
        try {
            const response = await fetch('/api/groq', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: pergunta, memoria: memoria })
            });
            const textResponse = await response.text();
            let data;
            try {
                data = JSON.parse(textResponse);
            } catch (jsonError) {
                console.error("Proxy retornou texto não-JSON:", textResponse.slice(0, 200));
                throw new Error("Resposta inválida do servidor");
            }
            if (!response.ok) throw new Error(data.error || `Erro HTTP ${response.status}`);
            const respostaIA = data.reply || "Não consegui responder. Tente de novo!";
            memoria.historicoCurto.push({ role: "assistant", content: respostaIA });
            historicoMensagens.push({ role: "user", content: pergunta });
            historicoMensagens.push({ role: "assistant", content: respostaIA });
            await salvarMensagemFirebase("user", pergunta);
            await salvarMensagemFirebase("assistant", respostaIA);
            return respostaIA;
        } catch (erro) {
            console.error("Erro no proxy:", erro);
            return "Desculpe, não consegui me conectar à minha central de conhecimentos agora. Tente novamente mais tarde. 🎨";
        }
    }
    
    // ======================= CARREGAR JSONs =======================
    async function carregarTodosJSONs() {
        statusDiv.innerText = "📥 Baixando respostas instantâneas...";
        const promises = [];
        for (const [key, filename] of Object.entries(jsonFiles)) {
            const url = GITHUB_BASE + filename;
            promises.push(
                fetch(url)
                    .then(res => res.ok ? res.json() : (console.warn(`Arquivo ${filename} não encontrado`), {}))
                    .catch(err => { console.warn(`Erro ${filename}:`, err); return {}; })
            );
        }
        const resultados = await Promise.all(promises);
        let idx = 0;
        for (const key of Object.keys(jsonFiles)) {
            dataStore[key] = resultados[idx++];
        }
        const carregados = Object.keys(dataStore).filter(k => Object.keys(dataStore[k]).length > 0);
        console.log("JSONs carregados:", carregados);
        statusDiv.innerText = carregados.length ? "🎨 Candinho pronto!" : "⚠️ Respostas instantâneas indisponíveis";
    }
    
    // ======================= INTERFACE =======================
    let isProcessing = false;
    async function enviar() {
        if (isProcessing) return;
        const texto = inputField.value.trim();
        if (!texto) return;
        isProcessing = true;
        sendBtn.disabled = true;
        inputField.disabled = true;
        addMessageToUI(texto, true);
        inputField.value = "";
        addLoading();
        try {
            const resposta = await responder(texto);
            removeLoading();
            addMessageToUI(resposta, false);
        } catch (err) {
            removeLoading();
            addMessageToUI("Ops! Ocorreu um erro inesperado. Recarregue a página e tente novamente.", false, true);
            console.error(err);
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            inputField.disabled = false;
            inputField.focus();
        }
    }
    sendBtn.addEventListener("click", enviar);
    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter" && !isProcessing) enviar(); });
    
    async function init() {
        await carregarTodosJSONs();
        await carregarHistoricoFirebase();
        if (historicoMensagens.length === 0) {
            let boasVindas = "Olá! Sou o Candinho, seu amigo artista. Pergunte sobre artistas, dança, história, ou peça uma piada! 🖌️";
            if (nomeUsuario) boasVindas = `Olá, ${nomeUsuario}! Sou o Candinho, seu amigo artista. Vamos criar? 🎨`;
            addMessageToUI(boasVindas, false);
            historicoMensagens.push({ role: "assistant", content: boasVindas });
            await salvarMensagemFirebase("assistant", boasVindas);
        }
    }
    init().catch(err => {
        console.error(err);
        statusDiv.innerText = "Erro crítico ao iniciar.";
        addMessageToUI("Não foi possível carregar os conhecimentos do Candinho. Verifique a conexão.", false, true);
    });
    
    window.enviar = enviar;
</script>
</body>
</html>
