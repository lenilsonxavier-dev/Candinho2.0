<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candinho - Seu Amigo Artista</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial;
    background: linear-gradient(135deg, #2b1b3a, #1a2a3a);
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    max-width: 800px;
    width: 100%;
    background: #000000aa;
    padding: 20px;
    border-radius: 20px;
}

#chat {
    height: 400px;
    overflow-y: auto;
    background: #00000055;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.msg { margin: 10px; padding: 10px; border-radius: 15px; }
.user { background: #1e6f5c; text-align: right; }
.bot { background: #4a2e6b; }

input { width: 70%; padding: 10px; border-radius: 20px; border: none; }
button { padding: 10px; border-radius: 20px; background: orange; border: none; }
</style>
</head>

<body>

<div class="container">
<h2>Candinho 🎨</h2>
<div id="chat"></div>
<input id="pergunta" placeholder="Pergunte algo...">
<button onclick="enviar()">Enviar</button>
</div>

<script type="importmap">
{
 "imports": {
  "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm@0.2.56"
 }
}
</script>

<script type="module">

import dancas from "./data/dancas.json";
import artes from "./data/artes_visuais.json";
import artistas from "./data/artistas.json";
import historia from "./data/historia_arte.json";
import teatro from "./data/teatro.json";
import musica from "./data/musica.json";
import folclore from "./data/folclore.json";
import ritmos from "./data/ritmos_musicais.json";

import festas from "./data/festas_brasileiras.json";
import lugares from "./data/lugares_arte.json";
import curiosidades from "./data/curiosidades.json";
import indigena from "./data/cultura_indigena.json";
import afro from "./data/cultura_afro_brasileira.json";
import atividades from "./data/atividades_artisticas.json";
import emocional from "./data/apoio_emocional.json";
import piadas from "./data/piadas.json";

import { CreateMLCEngine } from "@mlc-ai/web-llm";

// ================= BUSCADOR =================
function buscarContexto(pergunta) {
    const texto = pergunta.toLowerCase();

    const bases = [
    dancas, artes, artistas, historia,
    teatro, musica, folclore, ritmos,
    festas, lugares, indigena, afro,
    atividades, emocional
];

    for (const base of bases) {
        for (const chave in base) {
            const chaveFormatada = chave.replace(/_/g, " ");
            if (texto.includes(chaveFormatada)) {
                return base[chave].explicacao_infantil;
            }
        }
    }

    return "";
}

// ================= UTIL =================
function pegarAleatorio(obj) {
    const valores = Object.values(obj);
    return valores[Math.floor(Math.random() * valores.length)];
}

// ================= PERSONALIDADE =================
const systemPrompt = `
Você é Candinho, um senhor de 60 anos, gentil, paciente e apaixonado por arte, cultura e educação.

Você conversa com crianças como um avô professor muito carinhoso.

REGRAS:
- Use frases curtas
- Linguagem simples para crianças de 10 anos
- No máximo 3 ou 4 linhas
- Nunca use linguagem difícil
- Nunca use linguagem neutra
- Evite diminutivos excessivos
- Sempre seja positivo, acolhedor e educativo
- Sempre incentive a criatividade
- Explique de forma lúdica e clara
- Nunca trate assuntos inadequados
- Nunca seja rude
- Em caso de palavrões ou agressividade, responda com educação e traga o assunto para arte e aprendizado

CONHECIMENTO:
Você sabe sobre:
- artes visuais, desenho, pintura e escultura
- dança brasileira (maracatu, coco, caboclinho, cavalo-marinho)
- teatro e música
- artistas brasileiros e mundiais
- história da arte
- cultura indígena e afro-brasileira
- matemática básica, inglês básico e português

IDENTIDADE:
Seu nome é Candinho, em homenagem ao pintor brasileiro Cândido Portinari.

ESTILO:
Fale de forma natural, como uma conversa.
Evite respostas robóticas.
Sempre que possível, faça uma pergunta simples para estimular a criança.

OBJETIVO:
Ensinar, acolher e despertar curiosidade nas crianças através da arte.
Se a pergunta não for sobre arte, língua inglesa, matemática ou língua portuguesa, responda de forma educativa e gentil, conectando com aprendizado.

// ================= IA =================
let engine;

async function init() {
    engine = await CreateMLCEngine("TinyLlama-1.1B-Chat-v0.4-q4f16_1-MLC");
}

async function responder(pergunta) {

    const texto = pergunta.toLowerCase();

    // 🎲 respostas rápidas
    if (texto.includes("curiosidade")) return pegarAleatorio(curiosidades);
    if (texto.includes("piada")) return pegarAleatorio(piadas);
    if (texto.includes("atividade") || texto.includes("desafio")) return pegarAleatorio(atividades);
    if (texto.includes("triste") || texto.includes("raiva") || texto.includes("ansioso")) return pegarAleatorio(emocional).resposta;

    const contexto = buscarContexto(pergunta);

    const prompt = `
${systemPrompt}

Use isso:
${contexto || "Explique de forma simples para uma criança."}

Pergunta:
${pergunta}
`;

    const resp = await engine.chat.completions.create({
        messages: [{ role: "system", content: prompt }],
        max_tokens: 120
    });

    return resp.choices[0].message.content;
}

// ================= CHAT =================
const chat = document.getElementById("chat");

function addMsg(text, user=false) {
    const div = document.createElement("div");
    div.className = "msg " + (user ? "user" : "bot");
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
    const input = document.getElementById("pergunta");
    const texto = input.value;

    if (!texto) return;

    addMsg(texto, true);
    input.value = "";

    const resposta = await responder(texto);
    addMsg(resposta);
}

// iniciar IA
init();

</script>

</body>
</html>
